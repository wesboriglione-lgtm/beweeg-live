<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BEWEEG. V10</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0C0C0C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="BEWEEG.">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--ink:#0C0C0C;--ghost:#8A8580;--rule:#D6D0C6;--white:#FFF;--red:#8B2020}
*{margin:0;padding:0;box-sizing:border-box;-webkit-text-size-adjust:100%;touch-action:manipulation}
input,textarea,select{font-size:16px!important;touch-action:manipulation}
html,body{height:100%;overflow:hidden;overflow-x:hidden}
body{background:var(--white);color:var(--ink);font-family:'Montserrat',sans-serif;-webkit-font-smoothing:antialiased;font-size:14px}
.app{width:100%;max-width:420px;height:100%;display:flex;flex-direction:column;overflow:hidden;overflow-x:hidden;position:relative;background:var(--white);margin:0 auto}
.hdr{padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bg);flex-shrink:0}
.logo{font-size:18px;font-weight:900;letter-spacing:-.02em;cursor:pointer;text-transform:uppercase}
.logo .be,.logo .we,.logo .eg{color:var(--ink)}.logo .dot{display:inline-block;width:.18em;height:.18em;background:currentColor;vertical-align:baseline;margin-left:.04em}
.logo-sub{font-size:6px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--ghost);margin-top:1px;white-space:pre}
.layers{display:flex;gap:24px;justify-content:center;margin-bottom:24px}
.layer{display:flex;flex-direction:column;align-items:center;gap:6px}
.layer-letters{font-size:28px;font-weight:900;letter-spacing:.06em;line-height:1}
.layer-word{font-size:8px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--ghost)}
.layer-line{width:20px;height:1.5px;background:var(--rule);margin:2px 0}
.layer-sys{font-size:7px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--rule)}
.hdr-right{display:flex;gap:6px;align-items:center}
.hdr-btn{padding:5px 10px;font:700 8px/1 'Montserrat',sans-serif;letter-spacing:.14em;text-transform:uppercase;border:1.5px solid var(--ink);background:var(--white);color:var(--ink);cursor:pointer}
.hdr-btn:hover{background:var(--ink);color:var(--white)}
.hdr-btn.on{background:var(--ink);color:var(--white)}
.rtabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--bg);flex-shrink:0;-webkit-overflow-scrolling:touch}
.rtabs::-webkit-scrollbar{display:none}
.rtab{padding:8px 14px;font:700 8px/1 'Montserrat',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:var(--ghost);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0}
.rtab:hover{color:var(--ink)}
.rtab.on{color:var(--ink);border-bottom-color:var(--ink)}
.nav{display:flex;border-top:1px solid var(--bg);flex-shrink:0;background:var(--white);padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;padding:14px 4px 10px;font:700 9px/1 'Montserrat',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--rule);background:none;border:none;border-top:2px solid transparent;cursor:pointer;transition:color .2s,border-color .2s}
.nav-btn.on{color:var(--ink);border-top-color:var(--ink)}
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.scr{padding:28px 20px;animation:fi .3s ease}
.main>*{animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes letterIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotDrop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes dotGrow{from{width:clamp(10px,3vw,15px);height:clamp(10px,3vw,15px)}to{width:clamp(28px,6vw,40px);height:clamp(28px,6vw,40px)}}
@keyframes layerFade{from{opacity:0}to{opacity:1}}
@keyframes blockPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.96)}}
@keyframes blockIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes optsFade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.role-intro{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:var(--ink);user-select:none}
.merge-block-wrap{margin-top:clamp(40px,10vw,64px);opacity:0;animation:blockIn .5s ease .3s forwards}
.merge-block-wrap.pulse{animation:blockPulse 2.4s ease infinite}
.merge-block{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;cursor:pointer;padding:clamp(16px,4vw,22px) clamp(18px,5vw,26px);background:var(--white);transition:transform .12s}
.merge-block:hover{transform:scale(1.03)}
.merge-block-line{font-size:clamp(13px,3.5vw,16px);font-weight:900;letter-spacing:.12em;color:var(--ink);line-height:1.5}
.start-block{position:absolute;bottom:clamp(40px,10vw,72px);left:50%;transform:translateX(-50%);background:var(--white);color:var(--ink);padding:clamp(18px,5vw,24px) clamp(28px,7vw,40px);cursor:pointer;opacity:0;animation:blockIn .5s ease forwards;transition:transform .12s ease}
.start-block:hover{transform:translateX(-50%) scale(1.04)}
.role-opts-reveal{opacity:0;animation:optsFade .4s ease forwards}
.opening{display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;height:100%;background:var(--white);-webkit-tap-highlight-color:transparent;user-select:none;position:relative;padding:0 28px calc(40px + env(safe-area-inset-bottom,0))}
.opening-word{display:flex;gap:0;justify-content:center}
.opening-letter{font-size:clamp(48px,14vw,72px);font-weight:900;letter-spacing:-.02em;color:var(--white);opacity:0;animation:letterIn .4s ease forwards}
.opening-dot{display:inline-block;width:clamp(10px,3vw,14px);height:clamp(10px,3vw,14px);background:var(--white);margin-left:3px;align-self:flex-end;margin-bottom:clamp(6px,1.5vw,10px);opacity:0;animation:dotDrop .3s ease forwards;border-radius:0}
.opening-layers{display:flex;gap:clamp(32px,8vw,56px);margin-top:clamp(32px,6vw,48px);opacity:0;animation:layerFade .6s ease forwards}
.opening-layer{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:8px 12px;transition:all .2s ease}
.opening-layer:hover .opening-layer-letters{color:rgba(255,255,255,1)}
.opening-layer:hover .opening-layer-word{color:rgba(255,255,255,.6)}
.opening-layer:hover{border-bottom:2px solid rgba(255,255,255,.3);padding-bottom:6px}
.opening-layer-letters{font-size:clamp(20px,5vw,28px);font-weight:900;letter-spacing:.06em;color:var(--white);transition:color .2s}
.opening-layer-word{font-size:8px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.3);transition:color .2s}
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-msgs{flex:1;overflow-y:auto;padding:20px 20px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.msg{display:flex;animation:msgIn .3s ease}
.msg.sys{justify-content:flex-start}
.msg.usr{justify-content:flex-end}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.mbub{padding:14px 18px;font-size:13px;line-height:1.65;max-width:85%;font-weight:500}
.mbub.sys{background:var(--bg);color:var(--ink);border-radius:0 12px 12px 12px}
.mbub.usr{background:var(--ink);color:var(--white);border-radius:12px 0 12px 12px}
.mbub.intro{background:none;color:var(--ink);max-width:100%;padding:16px 0;font-size:11px;line-height:1.8;white-space:pre-line;border-bottom:1px solid var(--rule);margin-bottom:8px}
.mbub.intro strong{font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.02em}
.msrc{font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ghost);margin-top:4px;padding-left:2px}
.bron-wrap{padding:6px 0 0 0;display:flex;flex-direction:column;gap:2px}
.bron-line{font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ghost);padding-left:2px}
.bron-line::before{content:"";display:inline-block;width:6px;height:6px;background:var(--bg);margin-right:6px;vertical-align:middle}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{padding:10px 16px;font:600 11px/1 'Montserrat',sans-serif;background:var(--white);border:1.5px solid var(--ink);color:var(--ink);cursor:pointer;transition:all .15s;min-height:44px;display:flex;align-items:center}
.chip:hover{background:var(--ink);color:var(--white)}
.chip:active{background:var(--ink);color:var(--white);transform:scale(.97)}
.chat-input{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--bg);flex-shrink:0;padding-bottom:calc(14px + env(safe-area-inset-bottom,0))}
.chat-field{flex:1;padding:12px 16px;font:500 16px 'Montserrat',sans-serif;background:var(--bg);border:none;color:var(--ink);outline:none;border-radius:0;-webkit-appearance:none}
.chat-field:focus{background:var(--bg)}
.chat-field::placeholder{color:var(--ghost);font-weight:400}
.chat-send{padding:12px 20px;font:700 11px/1 'Montserrat',sans-serif;letter-spacing:.1em;background:var(--ink);color:var(--white);border:none;cursor:pointer;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.chat-send:active{opacity:.7}
.xl{font-size:clamp(38px,7vw,56px);font-weight:900;letter-spacing:-.03em;line-height:.86;text-transform:uppercase}
.lg{font-size:clamp(22px,4.5vw,34px);font-weight:900;letter-spacing:-.02em;line-height:.92;text-transform:uppercase}
.md{font-size:17px;font-weight:800;line-height:1.2}
.label{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--ghost)}
.body-text{font-size:13px;color:var(--ink);line-height:1.7}
.small{font-size:11px;color:var(--ghost);line-height:1.6}
.btn{display:block;width:100%;padding:14px;background:var(--ink);color:var(--white);font:800 10px/1 'Montserrat',sans-serif;letter-spacing:.16em;text-transform:uppercase;border:none;cursor:pointer;text-align:center}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.2;cursor:default}
.btn-sec{background:var(--white);color:var(--ink);border:1.5px solid var(--ink)}
.btn-sm{display:inline-block;width:auto;padding:10px 18px;font-size:9px}
.btn-ghost{display:block;width:100%;padding:10px;background:none;color:var(--ghost);font:600 9px/1 'Montserrat',sans-serif;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;text-align:center}
.opts{display:flex;flex-direction:column;gap:4px;margin-top:14px}
.opt{padding:12px 16px;border:1.5px solid var(--rule);background:var(--white);font:600 12px 'Montserrat',sans-serif;color:var(--ink);cursor:pointer;transition:all .12s;text-align:left;width:100%}
.opt:hover{border-color:var(--ink)}
.opt.sel{border-color:var(--ink);background:var(--ink);color:var(--white)}
.opt-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.opt-chip{padding:10px 14px;border:1.5px solid var(--rule);background:var(--white);font:600 11px 'Montserrat',sans-serif;color:var(--ink);cursor:pointer;transition:all .12s}
.opt-chip.sel{border-color:var(--ink);background:var(--ink);color:var(--white)}
.field{width:100%;border:none;border-bottom:2px solid var(--ink);font:600 16px 'Montserrat',sans-serif;padding:10px 0;background:none;color:var(--ink);outline:none;margin-top:14px}
.field::placeholder{color:var(--rule)}
.ta{width:100%;padding:12px;font:500 16px/1.6 'Montserrat',sans-serif;background:var(--bg);border:1.5px solid var(--rule);color:var(--ink);min-height:80px;resize:vertical;outline:none}
.ta:focus{border-color:var(--ink)}
.canon-timer{width:48px;height:48px;margin:0 auto 14px;position:relative;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900}
.canon-timer svg{position:absolute;top:0;left:0;width:48px;height:48px;transform:rotate(-90deg)}
.canon-timer svg circle{fill:none;stroke-width:2.5;stroke-linecap:round}
.canon-timer .trk{stroke:var(--rule)}
.canon-timer .fl{stroke:var(--ink);stroke-dasharray:141.37;transition:stroke-dashoffset .1s linear}
.canon-timer.warn .fl{stroke:var(--red)}
.canon-q{font-size:clamp(14px,3.5vw,17px);font-weight:800;line-height:1.4;text-align:center;padding:0 10px;min-height:52px;display:flex;align-items:center;justify-content:center}
.canon-btns{display:flex;gap:6px;padding:0 20px;margin-top:14px}
.canon-btns button{flex:1;padding:13px;font:700 10px/1 'Montserrat',sans-serif;letter-spacing:.12em;text-transform:uppercase;border:1.5px solid var(--rule);background:var(--white);cursor:pointer;color:var(--ink);transition:all .1s}
.canon-btns button:active,.canon-btns button.picked{background:var(--ink);color:var(--white);border-color:var(--ink)}
.canon-btns .tw{border-style:dashed}
.bar{margin-bottom:14px}
.bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.bar-label{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
.bar-val{font-size:11px;font-weight:800}
.bar-track{height:4px;background:var(--bg)}
.bar-fill{height:100%;background:var(--ink);transition:width .6s ease}
.bar-desc{font-size:9px;color:var(--ghost);margin-top:3px;line-height:1.4}
.card{background:var(--bg);padding:14px 16px;margin-bottom:3px}
/* Square blocks — ■ */
.blok-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.blok{aspect-ratio:1;background:var(--ink);color:var(--white);padding:14px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;position:relative;overflow:hidden;transition:transform .2s ease,opacity .2s ease;touch-action:pan-y;user-select:none;-webkit-user-select:none}
.blok.done{transform:scale(0);opacity:0;transition:transform .25s ease,opacity .25s ease}
.blok.blok-signal{background:var(--red)}
.blok.blok-sticky{background:var(--bg);color:var(--ink);cursor:default}
.blok-cat{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:none;opacity:.45}
.blok-text{font-size:13px;font-weight:800;line-height:1.35}
.blok-sub{font-size:10px;font-weight:500;opacity:.5;line-height:1.4}
.blok-done-wrap{grid-column:1/-1;text-align:center;padding:32px 0;opacity:.3}
.blok-done-text{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
.route-cat{margin-bottom:20px}
.route-cat-head{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;padding:0 2px}
.route-cat-label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink)}
.route-cat-count{font-size:9px;font-weight:600;opacity:.35}
.route-stack{display:flex;flex-direction:column;gap:4px}
.route-row{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--ink);color:var(--white);cursor:pointer;transition:transform .15s ease,opacity .15s ease}
.route-row.done{transform:scale(0);opacity:0;height:0;padding:0;overflow:hidden}
.route-row.route-signal{background:var(--red)}
.route-row.route-sticky{background:var(--bg);color:var(--ink);cursor:default}
.route-num{font-size:18px;font-weight:800;opacity:.3;min-width:22px;line-height:1}
.route-body{flex:1}
.route-title{font-size:13px;font-weight:800;line-height:1.35}
.route-sub{font-size:10px;font-weight:500;opacity:.5;line-height:1.4;margin-top:2px}
.card-v{font-size:13px;font-weight:700}
.signal{padding:12px 16px;margin-bottom:3px;border-left:3px solid var(--ghost)}
.signal.high{border-left-color:var(--red);background:var(--bg)}
.signal.med{border-left-color:var(--ghost);background:var(--bg)}
.signal.low{border-left-color:var(--ghost);background:var(--bg)}
.signal-type{font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ghost);margin-bottom:2px}
.signal-msg{font-size:11px;font-weight:600;line-height:1.4}
.signal-action{font-size:9px;color:var(--ghost);margin-top:4px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:12px}
.stat{background:var(--bg);padding:14px}
.stat-v{font-size:22px;font-weight:900;line-height:1}
.stat-l{font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ghost);margin-top:4px}
.person{padding:12px 16px;border-bottom:1px solid var(--bg);display:flex;align-items:center;gap:12px;cursor:pointer}
.person:hover{background:var(--bg)}
.person-av{width:34px;height:34px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.person-info{flex:1}
.person-name{font-size:12px;font-weight:700}
.person-sub{font-size:9px;color:var(--ghost);margin-top:1px}
.badge{font-size:7px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px}
.badge-match{background:var(--ink);color:var(--white)}
.badge-warn{background:var(--bg);color:var(--red)}
.badge-wait{background:var(--bg);color:var(--ghost)}
.badge-no{border:1px solid var(--red);color:var(--red)}
.sys-instr{padding:14px 16px;background:var(--ink);color:var(--white);font-size:11px;line-height:1.5;margin-bottom:8px}
.sys-label{font-size:7px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;opacity:.5;margin-bottom:4px}
.ex-block{padding:12px 16px;background:var(--bg);border:1.5px solid var(--rule);margin-bottom:4px}
.ex-name{font-weight:700;font-size:11px}
.ex-det{font-size:10px;color:var(--ghost);margin-top:2px}
.ex-why{font-size:9px;color:var(--ghost);margin-top:3px;font-style:italic}
.timeline{display:flex;gap:2px;margin:8px 0 14px}
.tday{flex:1;height:22px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.tday.goed{background:var(--ink);color:var(--white)}
.tday.oke{background:var(--ghost);color:var(--white)}
.tday.lastig{background:var(--bg);color:var(--ink);border:1px solid var(--ink)}
.tday.leeg{background:var(--bg);color:var(--rule)}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:0 28px}
.match-score{font-size:clamp(38px,10vw,50px);font-weight:900;letter-spacing:-.03em;line-height:.9}
.match-line{width:32px;height:2.5px;background:var(--ink);margin:14px auto}
.dnote{font-size:7px;color:var(--rule);margin-top:20px;padding-top:10px;border-top:1px solid var(--bg);text-transform:uppercase;letter-spacing:.1em}
.consent-block{background:var(--bg);padding:16px;margin-bottom:6px}
.consent-block .label{margin-bottom:6px}
.scale-row{display:flex;gap:6px;margin:10px 0}
.scale-btn{flex:1;padding:12px 0;font:700 13px 'Montserrat',sans-serif;text-align:center;border:1.5px solid var(--rule);background:var(--white);cursor:pointer;color:var(--ink);transition:all .12s}
.scale-btn.sel{background:var(--ink);color:var(--white);border-color:var(--ink)}
.confirm-opts{display:flex;gap:4px;margin-top:12px}
.confirm-opt{flex:1;padding:12px 8px;font:600 10px/1.2 'Montserrat',sans-serif;text-align:center;border:1.5px solid var(--rule);background:var(--white);cursor:pointer;color:var(--ink);transition:all .12s}
.confirm-opt.sel{background:var(--ink);color:var(--white);border-color:var(--ink)}
.onboard-progress{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;height:3px;background:var(--bg);z-index:999}
.onboard-fill{height:100%;background:var(--ink);transition:width .4s ease}
/* ═══ INLINE CONTEXT BLOCKS ═══ */
.ctx-intro{background:var(--bg);padding:14px 16px;margin-bottom:16px;position:relative}
.ctx-intro .ctx-title{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);margin-bottom:6px}
.ctx-intro .ctx-body{font-size:11px;font-weight:500;color:var(--ghost);line-height:1.6}
.ctx-intro .ctx-dismiss{position:absolute;top:10px;right:14px;background:none;border:none;font:700 10px 'Montserrat',sans-serif;color:var(--rule);cursor:pointer;letter-spacing:.06em}
.ctx-meaning{font-size:9px;font-weight:600;color:var(--ghost);margin-top:1px;letter-spacing:.04em}
.ctx-expand{margin-top:6px;padding:10px 12px;background:var(--bg);font-size:10px;color:var(--ink);line-height:1.6;display:none}
.ctx-expand.open{display:block}

const $=id=>document.getElementById(id);
const h=(tag,attrs,...kids)=>{
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class")el.className=v;
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="html")el.innerHTML=v;
    else if(k==="disabled"){if(v)el.setAttribute(k,"");else el.removeAttribute(k)}
    else el.setAttribute(k,v);
  });
  kids.flat(9).forEach(c=>{if(c!=null&&c!==false)el.append(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)});
  return el;
};

// ── BEWEGING BLOKKEN — gegenereerd uit Canon + Drive ──
// Elk blok = 1 constatering uit canon/drive → 1 beweging om eraan te werken
// Mentaal (spiegel-gesprek) + fysiek (video) samen in één blok
function generateBewegingBlokken(canvas){
  if(!canvas||!canvas.be.canon.scores||!canvas.be.drive.antwoorden)return[];
  const blokken=[];
  const scores=canvas.be.canon.scores;
  const blokscores=canvas.be.canon.blokscores||{};
  const da=canvas.be.drive.antwoorden||{};
  const d1=Array.isArray(da.D1)?da.D1:[];
  const d3=Array.isArray(da.D3)?da.D3:[]; // drempels
  const d4=Array.isArray(da.D4)?da.D4:[]; // eerder geprobeerd

  // 1. Drive-wil → wat persoon wil bereiken = hoofdbeweging
  d1.forEach((wil,i)=>{
    blokken.push({
      id:"bw-drive-"+i,
      type:"mentaal+fysiek",
      titel:wil,
      sub:"Dit wil je. Dit is je beweging.",
      bron:"drive",
      bronVeld:"D1",
      status:"open", // open | actief | afgerond
      videoNiveau:null, // wordt bepaald in spiegel
      spiegelGesprek:[], // berichten uit spiegel over dit blok
      routeStappen:[], // wat je gaat doen
      registratie:[] // wat je gedaan hebt
    });
  });

  // 2. Drempels → waar je vastloopt = confrontatie-beweging
  d3.forEach((drempel,i)=>{
    blokken.push({
      id:"bw-drempel-"+i,
      type:"mentaal",
      titel:drempel,
      sub:"Dit houdt je tegen. Eerst dit.",
      bron:"drive",
      bronVeld:"D3",
      status:"open",
      videoNiveau:null,
      spiegelGesprek:[],
      routeStappen:[],
      registratie:[]
    });
  });

  // 3. Canon zwakke blokken → waar je twijfelt = ontwikkelbeweging
  // DevGoals krijgen prioriteit. HappyBlocks worden overgeslagen.
  const devGoals=canvas.be.canon.devGoals||{};
  const zwakkeBlokken=Object.entries(blokscores)
    .filter(([k,v])=>v<50)
    .filter(([k])=>devGoals[k]!=="happyBlock") // skip blokken die persoon herkent
    .sort((a,b)=>{
      // devGoals eerst, dan op score (laagste eerst)
      const aG=devGoals[a[0]]==="devGoal"?0:1;
      const bG=devGoals[b[0]]==="devGoal"?0:1;
      if(aG!==bG)return aG-bG;
      return a[1]-b[1];
    });
  zwakkeBlokken.forEach(([blok,score],i)=>{
    const isDevGoal=devGoals[blok]==="devGoal";
    const meta=typeof BLOK_META!=="undefined"?BLOK_META[blok]:null;
    blokken.push({
      id:"bw-canon-"+blok.toLowerCase().replace(/\s/g,"-"),
      type:"mentaal",
      titel:blok,
      sub:isDevGoal?(meta?meta.desc+". Jouw keuze.":score+"% — jouw keuze om hieraan te werken."):(score+"% — hier zit ruimte."),
      bron:"canon",
      bronBlok:blok,
      isDevGoal:isDevGoal,
      status:"open",
      videoNiveau:null,
      spiegelGesprek:[],
      routeStappen:[],
      registratie:[]
    });
  });

  // 4. Fysiek bewegen blok — altijd als basis
  const heeftFysiek=blokken.some(b=>b.type==="mentaal+fysiek");
  if(!heeftFysiek){
    blokken.push({
      id:"bw-fysiek-basis",
      type:"mentaal+fysiek",
      titel:"In beweging komen",
      sub:"Bewegen is de basis. Hier begint het.",
      bron:"systeem",
      status:"open",
      videoNiveau:null,
      spiegelGesprek:[],
      routeStappen:[],
      registratie:[]
    });
  }

  // 5. Eerste blok = altijd actief
  if(blokken.length>0)blokken[0].status="actief";

  return blokken;
}

// ── Canvas I/O helpers ──
const Canvas={
  // Lees een waarde uit canvas via pad: "be.canon.scores"
  read(canvas,pad){
    if(!canvas||!pad)return null;
    return pad.split(".").reduce((obj,key)=>obj&&obj[key]!==undefined?obj[key]:null,canvas);
  },

  // Schrijf een waarde naar canvas via pad
  write(canvas,pad,waarde){
    if(!canvas||!pad)return;
    const keys=pad.split(".");
    const last=keys.pop();
    const target=keys.reduce((obj,key)=>{
      if(!obj[key])obj[key]={};
      return obj[key];
    },canvas);
    target[last]=waarde;
    canvas._updated=Date.now();
  },

  // ── Schrijf Canon resultaten naar canvas ──
  writeCanon(canvas,antwoorden,reactieTijden){
    if(!canvas)return;
    // Antwoorden opslaan met metadata
    const canonAnt={};
    Object.entries(antwoorden).forEach(([id,keuze])=>{
      canonAnt[id]={keuze,ms:reactieTijden?reactieTijden[id]||null:null,datum:Date.now()};
    });
    canvas.be.canon.antwoorden=canonAnt;

    // Scores berekenen
    const scores=calcCanon(antwoorden,reactieTijden);
    canvas.be.canon.scores=scores;

    // Blokscores berekenen
    const blokscores=canonBlokScores(antwoorden);
    canvas.be.canon.blokscores=blokscores;

    // Tier en datum
    const beantwoord=Object.keys(antwoorden).length;
    if(beantwoord<=18){
      canvas.be.canon.tier=1;
      canvas.be.canon.datumTier1=Date.now();
    }else{
      canvas.be.canon.tier=2;
      canvas.be.canon.datumTier2=Date.now();
    }

    // Origineel opslaan in EG als het de eerste keer is
    if(!canvas.eg.canonVerschuiving.origineel){
      canvas.eg.canonVerschuiving.origineel={...scores};
      canvas.eg.canonVerschuiving.huidig={...scores};
      canvas.eg.canonVerschuiving.delta={WIJ:0,KIEZEN:0,INVESTEREN:0};
    }

    canvas._updated=Date.now();
  },

  // ── Schrijf Drive resultaten naar canvas ──
  writeDrive(canvas,antwoorden){
    if(!canvas)return;
    canvas.be.drive.antwoorden={...antwoorden};

    // Kwaliteitsscores per tekstveld
    const kwaliteit={};
    ["D2","D4b","D5b"].forEach(k=>{
      if(antwoorden[k])kwaliteit[k]=textQuality(antwoorden[k]);
    });
    canvas.be.drive.kwaliteit=kwaliteit;

    // Drive score berekenen
    canvas.be.drive.score=calcDrive(antwoorden);
    canvas._updated=Date.now();
  },

  // ── Schrijf Match resultaat naar canvas ──
  writeMatch(canvas){
    if(!canvas||!canvas.be.canon.scores||canvas.be.drive.score==null)return;
    // Haal ruwe antwoorden + tijden op uit canon.antwoorden (format: {id:{keuze,ms}})
    const rawAnt=canvas.be.canon.antwoorden||{};
    const cAns={};const cTimes={};
    Object.entries(rawAnt).forEach(([id,obj])=>{cAns[id]=typeof obj==="object"?obj.keuze:obj;if(typeof obj==="object"&&obj.ms)cTimes[id]=obj.ms});
    const result=calcMatch(canvas.be.canon.scores,canvas.be.drive.score,{canonAns:cAns,canonTimes:cTimes,driveAns:canvas.be.drive.antwoorden||{}});
    canvas.be.match.score=result.score;
    canvas.be.match.reject=result.reject;
    canvas.be.match.datum=Date.now();

    // Uitkomst bepalen
    if(result.reject){
      canvas.be.match.uitkomst="nee";
    }else if(result.score>=45){
      // Check zwakke blokken
      const blokscores=canvas.be.canon.blokscores||{};
      const zwak=Object.entries(blokscores).filter(([k,v])=>v<40).map(([k])=>k);
      canvas.be.match.zwakkeBlokken=zwak;
      canvas.be.match.uitkomst=zwak.length>0?"ja-met-blokken":"ja";

      // Ontwikkelblokken aanmaken als nodig
      if(zwak.length>0){
        canvas.we.ontwikkelblokken=zwak.map(blok=>({blok,status:"open",startDatum:null,eindDatum:null}));
      }
    }else{
      canvas.be.match.uitkomst="nee";
    }

    // JOUW BEWEGING — genereer blokken uit canon + drive
    if(canvas.be.match.uitkomst!=="nee"){
      canvas.we.bewegingBlokken=generateBewegingBlokken(canvas);
    }
    canvas._updated=Date.now();
  },

  // ── Schrijf Route naar canvas ──
  writeRoute(canvas,addOn,reden){
    if(!canvas)return;
    // Geschiedenis bijhouden
    if(canvas.we.route.addOn!==null){
      canvas.we.route.geschiedenis.push({
        datum:Date.now(),
        addOn:canvas.we.route.addOn,
        reden:reden||"route-wijziging"
      });
      canvas.we.route.versie++;
    }
    canvas.we.route.addOn=addOn;
    canvas.we.route.bron="canvas.be";
    canvas.we.route.advies=addOn; // systeem-advies = huidige keuze
    canvas._updated=Date.now();
  },

  // ── Schrijf BEWEEG JE? moment naar canvas ──
  writeMoment(canvas,blok,zin){
    if(!canvas)return;
    canvas.eg.spiegel.momenten.push({
      datum:Date.now(),
      blok:blok,  // "zwart" | "grijs" | "lijn"
      zin:zin||null,
      bron:"canvas"
    });
    // Herbereken patronen + signalen + verschuiving
    Canvas.updatePatronen(canvas);
    Canvas.updateSignalen(canvas);
    Canvas.updateVerschuiving(canvas);
    Canvas.updateSamenvatting(canvas);
    canvas._updated=Date.now();
  },

  // ── Herbereken spiegel-patronen op basis van momenten ──
  updatePatronen(canvas){
    if(!canvas)return;
    const momenten=canvas.eg.spiegel.momenten;
    if(!momenten||momenten.length<2){
      canvas.eg.spiegel.patronen={trend:null,streak:0,consistentie:0,herhaaldVast:0,afwezigheid:0,totaal:momenten?momenten.length:0};
      return;
    }
    const totaal=momenten.length;
    const recent=momenten.slice(-4);
    const vastRecent=recent.filter(m=>m.blok==="lijn").length;
    const grijsRecent=recent.filter(m=>m.blok==="grijs").length;

    // Streak: hoe lang achtereen zwart of grijs (niet lijn)
    let streak=0;
    for(let i=momenten.length-1;i>=0;i--){
      if(momenten[i].blok==="zwart"||momenten[i].blok==="grijs")streak++;
      else break;
    }

    // Trend
    let trend="stabiel";
    if(momenten.length>=6){
      const vals=m=>m.blok==="zwart"?3:m.blok==="grijs"?2:1;
      const last3=momenten.slice(-3).map(vals);
      const prev3=momenten.slice(-6,-3).map(vals);
      const avgL=last3.reduce((a,b)=>a+b,0)/last3.length;
      const avgP=prev3.reduce((a,b)=>a+b,0)/prev3.length;
      if(avgL>avgP+0.3)trend="stijgend";
      else if(avgL<avgP-0.3)trend="dalend";
    }

    // Consistentie = % zwart+grijs van totaal
    const actief=momenten.filter(m=>m.blok==="zwart"||m.blok==="grijs").length;
    const consistentie=Math.round(actief/totaal*100);

    // Afwezigheid: gaps in tijd (>4 dagen tussen momenten)
    let afwezigheid=0;
    for(let i=1;i<momenten.length;i++){
      if(momenten[i].datum&&momenten[i-1].datum){
        const gap=(momenten[i].datum-momenten[i-1].datum)/86400000;
        if(gap>4)afwezigheid++;
      }
    }

    canvas.eg.spiegel.patronen={trend,streak,consistentie,herhaaldVast:vastRecent,afwezigheid,totaal};
  },

  // ── Update signalen op basis van patronen ──
  updateSignalen(canvas){
    if(!canvas)return;
    const p=canvas.eg.spiegel.patronen||{};
    const signalen=[];
    if(p.herhaaldVast>=2)signalen.push({sev:"high",tekst:"Herhaald vast. Patroon. Niet negeren.",actie:"Praat met je trainer.",bron:p.herhaaldVast+"x lijn in 4 momenten",datum:Date.now()});
    if(p.afwezigheid>=3)signalen.push({sev:"high",tekst:p.afwezigheid+" gemiste momenten.",actie:"Vul vandaag je moment in.",bron:p.afwezigheid+" gaps",datum:Date.now()});
    if(p.trend==="dalend")signalen.push({sev:"med",tekst:"Trend daalt. Nog geen interventie. Wel aandacht.",bron:"Trend dalend",datum:Date.now()});
    if(p.consistentie&&p.streak>=4)signalen.push({sev:"low",tekst:"Consistentie: "+p.streak+" keer op rij.",bron:"Streak: "+p.streak,datum:Date.now()});
    if(p.trend==="stijgend")signalen.push({sev:"low",tekst:"Trend stijgt.",bron:"Trend stijgend",datum:Date.now()});
    // Verplaats oude actieve naar historie
    if(canvas.eg.signalen.actief.length>0){
      canvas.eg.signalen.historie.push(...canvas.eg.signalen.actief);
    }
    canvas.eg.signalen.actief=signalen;
  },

  // ── Update Canon-verschuiving op basis van gedrag ──
  updateVerschuiving(canvas){
    if(!canvas||!canvas.be.canon.scores)return;
    const orig=canvas.eg.canonVerschuiving.origineel;
    if(!orig)return;

    const momenten=canvas.eg.spiegel.momenten||[];
    const sessies=canvas.we.training.sessies||[];
    const patronen=canvas.eg.spiegel.patronen||{};

    // Gebruik bestaande Spiegel.shiftCanon logica
    const shifted=Spiegel.shiftCanon(canvas.be.canon.scores,
      // Converteer momenten naar cks-formaat voor backward compat
      momenten.map(m=>({mood:m.blok==="zwart"?"Goed":m.blok==="grijs"?"Oke":"Lastig",date:m.datum})),
      sessies.map(s=>({showed:s.aanwezig,ex:s.oefeningen||[]}))
    );

    canvas.eg.canonVerschuiving.huidig=shifted;
    canvas.eg.canonVerschuiving.delta={
      WIJ:shifted.WIJ-orig.WIJ,
      KIEZEN:shifted.KIEZEN-orig.KIEZEN,
      INVESTEREN:shifted.INVESTEREN-orig.INVESTEREN
    };
    canvas._updated=Date.now();
  },

  // ── Update samenvatting voor kring/bedrijf ──
  updateSamenvatting(canvas){
    if(!canvas)return;
    const p=canvas.eg.spiegel.patronen||{};
    const actief=canvas.eg.signalen.actief||[];
    canvas.eg.samenvatting={
      consistentie:p.consistentie||null,
      trend:p.trend||null,
      actieveSignalen:actief.length,
      aanwezigheid:canvas.we.training.aanwezigheid?canvas.we.training.aanwezigheid.percentage:null
    };
  },

  // ── Migreer V8 state naar Canvas ──
  fromState(s){
    const rol=s.role||"klant";
    // Normaliseer: online → klant
    const normRol=(rol==="online"||rol==="klant")?"klant":rol;
    const c=createCanvas(normRol);

    // BE: profiel
    c.be.profiel.naam=s.ud?s.ud.name:s.matchName||null;
    c.be.profiel.startDatum=s.startDate||null;

    // BE: canon
    if(s.canonAns&&Object.keys(s.canonAns).length>0){
      const ant={};
      Object.entries(s.canonAns).forEach(([id,keuze])=>{
        ant[id]={keuze,ms:s.canonTimes?s.canonTimes[id]||null:null,datum:null};
      });
      c.be.canon.antwoorden=ant;
      c.be.canon.scores=s.ud?s.ud.canonScores:calcCanon(s.canonAns);
      c.be.canon.blokscores=canonBlokScores(s.canonAns);
      c.be.canon.tier=Object.keys(s.canonAns).length>18?2:1;
    }

    // BE: drive
    if(s.driveAns&&Object.keys(s.driveAns).length>0){
      c.be.drive.antwoorden={...s.driveAns};
      c.be.drive.score=s.ud?s.ud.driveScore:calcDrive(s.driveAns);
    }

    // BE: match
    if(s.ud&&s.ud.matchScore!=null){
      c.be.match.score=s.ud.matchScore;
      c.be.match.uitkomst=s.ud.matchScore>=45?"ja":"nee";
      c.be.match.datum=s.startDate||null;
    }

    // BE: baseline
    if(s.baseline)c.be.baseline={...s.baseline};

    // WE: route
    if(s.ud&&s.ud.route){
      c.we.route.basis="online";
      // Als het een fysiek product is, zet als addOn
      const fysiek=["LEAN","PT Small","DUO","PT","HERO"];
      if(fysiek.includes(s.ud.route)){
        c.we.route.addOn=s.ud.route;
      }
    }

    // WE: training (sessies)
    if(s.sess&&s.sess.length>0){
      c.we.training.sessies=s.sess.map(se=>({
        week:se.week,datum:null,aanwezig:se.showed,
        oefeningen:(se.ex||[]).map(e=>({naam:e.n,sets:e.s,reps:null,gewicht:e.w}))
      }));
      const aan=s.sess.filter(se=>se.showed).length;
      const gem=s.sess.filter(se=>!se.showed).length;
      c.we.training.aanwezigheid={aanwezig:aan,gemist:gem,totaal:aan+gem,percentage:Math.round(aan/(aan+gem)*100)};
    }

    // EG: spiegel momenten (migreer check-ins → momenten)
    if(s.cks&&s.cks.length>0){
      c.eg.spiegel.momenten=s.cks.map(ck=>({
        datum:ck.date||Date.now(),
        blok:ck.mood==="Goed"?"zwart":ck.mood==="Lastig"?"lijn":"grijs",
        zin:ck.note||null,
        bron:"canvas"
      }));
      Canvas.updatePatronen(c);
    }

    // EG: herinneringen (spiegel memory)
    if(s.spiegelMemory&&s.spiegelMemory.length>0){
      c.eg.spiegel.herinneringen=s.spiegelMemory.map(m=>({tekst:m.text,datum:m.date}));
    }

    // EG: canon verschuiving
    if(c.be.canon.scores){
      c.eg.canonVerschuiving.origineel={...c.be.canon.scores};
      c.eg.canonVerschuiving.huidig={...c.be.canon.scores};
      c.eg.canonVerschuiving.delta={WIJ:0,KIEZEN:0,INVESTEREN:0};
      Canvas.updateVerschuiving(c);
    }

    // EG: evaluatie
    if(s.evalDone){
      c.eg.evaluatie.push({sessie:6,datum:s.evalDate||Date.now(),status:"gedaan",antwoorden:{gevoel:s.evalAnswer},canonVerschuiving:null,routeAdvies:null,beslissing:null});
    }

    // WE: bewegingBlokken genereren als match ja is
    if(c.be.match.uitkomst!=="nee"&&c.be.canon.scores&&c.be.drive.antwoorden){
      c.we.bewegingBlokken=generateBewegingBlokken(c);
    }

    // Samenvatting
    Canvas.updateSamenvatting(c);

    return c;
  },

  // ── Sync canvas terug naar V8 state formaat (backward compat) ──
  toStateCompat(canvas){
    if(!canvas)return{};
    const scores=canvas.be.canon.scores;
    const driveScore=canvas.be.drive.score;
    const matchScore=canvas.be.match.score;
    const addOn=canvas.we.route.addOn;

    // Converteer momenten terug naar cks-formaat
    const cks=(canvas.eg.spiegel.momenten||[]).map(m=>({
      mood:m.blok==="zwart"?"Goed":m.blok==="grijs"?"Oke":"Lastig",
      note:m.zin||"",
      date:m.datum,
      day:new Date(m.datum).getDay(),
      week:null
    }));

    // Converteer sessies terug
    const sess=(canvas.we.training.sessies||[]).map(s=>({
      week:s.week,showed:s.aanwezig,
      ex:(s.oefeningen||[]).map(e=>({n:e.naam,s:e.sets,w:e.gewicht}))
    }));

    // Converteer canon antwoorden terug
    const canonAns={};
    Object.entries(canvas.be.canon.antwoorden||{}).forEach(([id,obj])=>{
      canonAns[id]=typeof obj==="object"?obj.keuze:obj;
    });

    return{
      ud:{
        name:canvas.be.profiel.naam,
        canonScores:scores,
        canonAns:canonAns,
        driveAns:canvas.be.drive.antwoorden,
        driveScore:driveScore,
        matchScore:matchScore,
        route:addOn||"Licentie",
        startDate:canvas.be.profiel.startDatum
      },
      canonAns:canonAns,
      driveAns:canvas.be.drive.antwoorden,
      baseline:canvas.be.baseline,
      cks:cks,
      sess:sess,
      spiegelMemory:(canvas.eg.spiegel.herinneringen||[]).map(h=>({text:h.tekst,date:h.datum})),
      evalDone:canvas.eg.evaluatie.some(e=>e.status==="gedaan"),
      evalAnswer:canvas.eg.evaluatie.length>0?canvas.eg.evaluatie[canvas.eg.evaluatie.length-1].antwoorden:null,
      startDate:canvas.be.profiel.startDatum
    };
  }
};

function calcCanon(answers,times){
  const f={WIJ:[],KIEZEN:[],INVESTEREN:[]};
  CANON.forEach(c=>{
    const v=answers[c.id];
    let score=v==="ja"?1:v==="twijfel"?0.5:0;
    // Reactietijd-penalty: ja in <1s = te snel nagedacht, halve score
    if(v==="ja"&&times&&times[c.id]&&times[c.id]<1000)score=0.5;
    f[c.fase].push(score);
  });
  const avg=a=>a.length?Math.round(a.reduce((s,v)=>s+v,0)/a.length*100):0;
  return{WIJ:avg(f.WIJ),KIEZEN:avg(f.KIEZEN),INVESTEREN:avg(f.INVESTEREN)};
}
function textQuality(t){
  if(!t||t.length<3)return 0;
  if(/(.)\1{4,}/.test(t))return 0;
  const words=t.trim().split(/\s+/).filter(w=>w.length>1);
  if(words.length<2)return 0.3;
  const unique=new Set(words.map(w=>w.toLowerCase()));
  if(unique.size<2)return 0.2;
  return 1;
}
function calcDrive(ans){
  const tScore=(t,w)=>{const l=t?t.length:0;const quality=textQuality(t);return(l>=20?1:l>=8?0.7:l>0?0.3:0)*quality*w};
  const multiScore=["D1","D3","D4"].reduce((s,k)=>{const v=ans[k];return s+(Array.isArray(v)?(v.length>=3?1:v.length>=1?0.5:0):0)},0)/3;
  const textScore=(tScore(ans.D2,3)+tScore(ans.D4b,2)+tScore(ans.D5b,1))/6;
  return Math.round((textScore*0.6+multiScore*0.4)*100);
}
function calcMatch(cs,ds,opts){
  // opts: {canonAns,canonTimes,driveAns} — optioneel, voor rejection rules
  const o=opts||{};

  // Rejection rule 1: DRIVE_SHALLOW — Drive score te laag
  if(ds<15)return{score:0,reject:"DRIVE_SHALLOW"};

  // Rejection rule 2: REASON_SHALLOW — D2 (waarom) is te oppervlakkig
  if(o.driveAns&&o.driveAns.D2&&textQuality(o.driveAns.D2)<0.5)return{score:0,reject:"REASON_SHALLOW"};

  // Rejection rule 3: SPEED_JA — >50% ja in <1s (doorklikt zonder denken)
  if(o.canonAns&&o.canonTimes){
    const jaAns=Object.entries(o.canonAns).filter(([k,v])=>v==="ja");
    if(jaAns.length>0){
      const snelJa=jaAns.filter(([k])=>o.canonTimes[k]&&o.canonTimes[k]<1000).length;
      if(snelJa/jaAns.length>0.5)return{score:0,reject:"SPEED_JA"};
    }
  }

  // Rejection rule 4: SPEED_ALL — gemiddelde reactietijd <1.5s
  if(o.canonTimes){
    const times=Object.values(o.canonTimes).filter(t=>t>0);
    if(times.length>0){
      const gem=times.reduce((a,b)=>a+b,0)/times.length;
      if(gem<1500)return{score:0,reject:"SPEED_ALL"};
    }
  }

  // Rejection rule 5: ALL_NEE — alles nee
  if(o.canonAns){
    const vals=Object.values(o.canonAns);
    if(vals.length>0&&vals.every(v=>v==="nee"))return{score:0,reject:"ALL_NEE"};
  }

  const weighted=cs.WIJ*0.25+cs.KIEZEN*0.30+cs.INVESTEREN*0.45;
  const score=Math.round((weighted*0.6+ds*0.4)/100*100);
  return{score,reject:null};
}
function matchExplanation(cs,ds,score,reject){
  if(reject==="DRIVE_SHALLOW")return"Je Drive geeft niet genoeg om mee te werken. Zonder echte antwoorden geen match.";
  if(reject==="REASON_SHALLOW")return"Je hebt niet gezegd waarom je dit wilt. Zonder waarom geen match.";
  if(reject==="SPEED_JA")return"Je hebt te snel geklikt. Canon vraagt dat je nadenkt. Dat is niet gebeurd.";
  if(reject==="SPEED_ALL")return"Gemiddeld onder 1,5 seconde per vraag. Dat is te snel voor eerlijke antwoorden.";
  if(reject==="ALL_NEE")return"Je hebt overal nee gezegd. Er is geen basis om mee te werken.";
  if(score<45)return"Canon en Drive komen niet genoeg samen. Je INVESTEREN staat op "+cs.INVESTEREN+"%. Dat is te laag voor een match.";
  // Match ja
  const sterkste=cs.INVESTEREN>=cs.KIEZEN&&cs.INVESTEREN>=cs.WIJ?"INVESTEREN":cs.KIEZEN>=cs.WIJ?"KIEZEN":"WIJ";
  const sterksteNaam={WIJ:"hoe je denkt",KIEZEN:"wat je kiest",INVESTEREN:"wat je investeert"}[sterkste];
  if(score>=70)return"Het sterkst in "+sterksteNaam+". Drive bevestigt het. Daar bouwen we op.";
  if(score>=55)return"Match. "+sterksteNaam.charAt(0).toUpperCase()+sterksteNaam.slice(1)+" is je basis. De rest is ontwikkeling.";
  return"Match. Maar krap. Vooral "+sterksteNaam+" houdt het overeind. De blokken wijzen de weg.";
}

// Canon scores per blok
function canonBlokScores(answers){
  const scores={};
  BLOKKEN.forEach(blok=>{
    const stell=CANON.filter(c=>c.blok===blok);
    const answered=stell.filter(c=>answers[c.id]);
    if(!answered.length){scores[blok]=0;return}
    const sum=answered.reduce((s,c)=>{const v=answers[c.id];return s+(v==="ja"?1:v==="twijfel"?0.5:0)},0);
    scores[blok]=Math.round(sum/answered.length*100);
  });
  return scores;
}

const Spiegel={
  analyzeCheckins(cks){
    if(!cks||cks.length<2)return{pattern:null,trend:null,consistency:0,streak:0,gaps:0,total:0};
    const moods=cks.filter(c=>c.mood);
    const consistency=Math.round(moods.length/cks.length*100);
    const gaps=cks.filter(c=>!c.mood).length;
    const lastThree=moods.slice(-3).map(c=>c.mood);
    let trend="stabiel";
    if(lastThree.length>=3){
      const vals=lastThree.map(m=>m==="Goed"?3:m==="Oke"?2:1);
      const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
      const prev=moods.slice(-6,-3).map(c=>c.mood==="Goed"?3:c.mood==="Oke"?2:1);
      if(prev.length>=2){const pAvg=prev.reduce((a,b)=>a+b,0)/prev.length;if(avg>pAvg+0.3)trend="stijgend";else if(avg<pAvg-0.3)trend="dalend"}
    }
    let streak=0;for(let i=moods.length-1;i>=0;i--){if(moods[i].mood==="Goed"||moods[i].mood==="Oke")streak++;else break}
    const lastigRecent=moods.slice(-4).filter(c=>c.mood==="Lastig").length;
    let pattern=null;
    if(lastigRecent>=2)pattern="herhaald-lastig";else if(gaps>=3)pattern="afwezigheid";else if(streak>=4)pattern="consistentie";else if(trend==="stijgend")pattern="groei";else if(trend==="dalend")pattern="daling";
    return{pattern,trend,consistency,streak,gaps,lastigRecent,total:moods.length};
  },
  analyzeSessions(sess){
    if(!sess||!sess.length)return{attended:0,missed:0,rate:0,progressions:[]};
    const attended=sess.filter(s=>s.showed).length;const missed=sess.filter(s=>!s.showed).length;
    const rate=Math.round(attended/(attended+missed)*100);
    const exMap={};sess.filter(s=>s.showed).forEach(s=>s.ex.forEach(e=>{if(!exMap[e.n])exMap[e.n]=[];exMap[e.n].push(e)}));
    const progressions=[];Object.entries(exMap).forEach(([name,entries])=>{if(entries.length>=3){const first=entries[0],last=entries[entries.length-1];if(first.w!==last.w||first.s!==last.s)progressions.push({name,from:first,to:last})}});
    return{attended,missed,rate,progressions};
  },
  shiftCanon(orig,cks,sess){
    if(!orig)return orig;const a=this.analyzeCheckins(cks);const s=this.analyzeSessions(sess);
    let wij=orig.WIJ,kiezen=orig.KIEZEN,investeren=orig.INVESTEREN;
    if(a.consistency>75)investeren=Math.min(100,investeren+Math.round((a.consistency-75)/5));
    if(a.consistency<50)investeren=Math.max(10,investeren-Math.round((50-a.consistency)/5));
    if(a.streak>=4)wij=Math.min(100,wij+3);if(a.gaps>=3)wij=Math.max(10,wij-4);
    if(s.rate>80)kiezen=Math.min(100,kiezen+4);if(s.rate<60)kiezen=Math.max(10,kiezen-3);
    return{WIJ:wij,KIEZEN:kiezen,INVESTEREN:investeren};
  },
  getSignals(ud,cks,sess){
    const a=this.analyzeCheckins(cks);const s=this.analyzeSessions(sess);const shifted=this.shiftCanon(ud&&ud.canonScores,cks,sess);const orig=ud&&ud.canonScores;const signals=[];
    if(a.pattern==="herhaald-lastig")signals.push({sev:"high",text:"Herhaald lastig. Patroon. Niet negeren.",action:"Praat met je trainer.",src:a.lastigRecent+"x lastig in 4 check-ins"});
    if(a.pattern==="afwezigheid")signals.push({sev:"high",text:a.gaps+" gemiste check-ins.",action:"Vul vandaag je check-in in.",src:a.gaps+" gaps"});
    if(a.trend==="dalend")signals.push({sev:"med",text:"Trend daalt. Nog geen interventie. Wel aandacht.",src:"Trend dalend"});
    if(a.pattern==="consistentie")signals.push({sev:"low",text:"Consistentie: "+a.streak+" keer op rij.",src:"Streak: "+a.streak});
    if(a.trend==="stijgend")signals.push({sev:"low",text:"Trend stijgt.",src:"Trend stijgend"});
    if(shifted&&orig){
      if(shifted.INVESTEREN>orig.INVESTEREN+2)signals.push({sev:"low",text:"INVESTEREN stijgt. Was "+orig.INVESTEREN+"%. Nu "+shifted.INVESTEREN+"%.",src:"INVESTEREN verschuiving"});
      if(shifted.INVESTEREN<orig.INVESTEREN-2)signals.push({sev:"med",text:"INVESTEREN daalt. Was "+orig.INVESTEREN+"%. Nu "+shifted.INVESTEREN+"%.",action:"Bespreek met je trainer.",src:"INVESTEREN daling"});
    }
    return signals;
  },

  // ── PREVENTIE: vooraf signaleren, niet achteraf ──
  getPreventieSignals(ud,cks,blocksCompleted,spiegelMemory,startDate){
    const signals=[];
    const now=Date.now();
    const a=this.analyzeCheckins(cks||[]);
    const completed=blocksCompleted||[];
    const memory=spiegelMemory||[];

    // 1. Afnemende blok-activiteit (minder blokken per dag)
    const week1=completed.filter(b=>b.date&&(now-b.date)<7*86400000).length;
    const week2=completed.filter(b=>b.date&&(now-b.date)>=7*86400000&&(now-b.date)<14*86400000).length;
    if(week2>0&&week1<week2*0.5) signals.push({type:"activiteit",sev:"early",text:"Je doet minder dan vorige week",sub:"Week 1: "+week2+" blokken. Nu: "+week1+".",action:"De spiegel wil weten wat er speelt."});

    // 2. Langere pauzes tussen check-ins
    if(cks&&cks.length>=2){
      const lastTwo=cks.slice(-2);
      if(lastTwo[1].date&&lastTwo[0].date){
        const gap=(lastTwo[1].date-lastTwo[0].date)/86400000;
        if(gap>4) signals.push({type:"pauze",sev:"early",text:"Het is "+Math.round(gap)+" dagen geleden",sub:"Het systeem mist je input.",action:"Check in. Het hoeft niet lang."});
      }
    }
    // Geen check-ins maar wel startDate
    if(startDate&&(!cks||cks.length===0)){
      const daysSince=Math.floor((now-startDate)/86400000);
      if(daysSince>=3) signals.push({type:"nooit",sev:"early",text:"Nog geen check-in",sub:"Dag "+daysSince+". De data heeft jou nodig.",action:"Je eerste check-in maakt alles mogelijk."});
    }

    // 3. Spiegel wordt minder gebruikt
    const recentMemory=memory.filter(m=>m.date&&(now-m.date)<7*86400000).length;
    const olderMemory=memory.filter(m=>m.date&&(now-m.date)>=7*86400000&&(now-m.date)<14*86400000).length;
    if(olderMemory>2&&recentMemory===0) signals.push({type:"spiegel",sev:"early",text:"De spiegel mist je",sub:"Vorige week "+olderMemory+"x. Deze week 0.",action:"Eén zin is genoeg."});

    // 4. INVESTEREN begint te zakken (niet al gecrasht)
    const shifted=this.shiftCanon(ud&&ud.canonScores,cks||[],[]);
    const orig=ud&&ud.canonScores;
    if(shifted&&orig&&shifted.INVESTEREN<orig.INVESTEREN&&shifted.INVESTEREN>=orig.INVESTEREN-5){
      signals.push({type:"investeren",sev:"early",text:"Je investering zakt licht",sub:"Was "+orig.INVESTEREN+"%. Nu "+shifted.INVESTEREN+"%.",action:"Niet erg. Wel een signaal."});
    }

    // 5. Patroon: Oke → Oke → Oke (stagnatie, niet slecht maar niet goed)
    if(cks&&cks.length>=4){
      const last4=cks.slice(-4).map(c=>c.mood);
      if(last4.every(m=>m==="Oke")) signals.push({type:"stagnatie",sev:"early",text:"4x Oke op rij",sub:"Niet slecht. Niet goed. Stagnatie.",action:"De spiegel vraagt: wat mis je?"});
    }

    return signals;
  }
};

async function callLLM(messages,ud,cks,sess){
  // ── Eerst proberen: lokale Chat engine (altijd beschikbaar) ──
  const lastMsg=messages.length>0?messages[messages.length-1]:null;
  const userText=lastMsg?lastMsg.text:"";

  // Bepaal context voor lokale engine
  let ctx="spiegel";
  if(!ud||!ud.matchScore)ctx="ontdekken";
  else if((state.cks||[]).length>0)ctx="spiegel";

  // ── Als er een API key is: gebruik LLM ──
  if(_apiKey){
    const sys=buildSystemPrompt(ud,cks,sess);
    try{
      const useProxy=_apiKey==="PROXY";
      const apiUrl=useProxy?"/api/spiegel":"https://api.anthropic.com/v1/messages";
      const hdrs=useProxy?{"Content-Type":"application/json"}:{"Content-Type":"application/json","x-api-key":_apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
      const res=await fetch(apiUrl,{
        method:"POST",
        headers:hdrs,
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:800,system:sys,messages:messages.map(m=>({role:m.t==="usr"?"user":"assistant",content:m.text}))})
      });
      if(!res.ok){
        const e=await res.text();
        if(res.status===401){_apiKey=null;localStorage.removeItem("beweeg_api_key");}
        // Bij fout: val terug op lokale engine
        const local=Chat.respond(userText,ud,cks,sess,ctx);
        return local||{text:"Er ging iets mis. Probeer het opnieuw.",chips:[]};
      }
      const data=await res.json();
      const reply=data.content&&data.content[0]?data.content[0].text:"Geen antwoord.";
      return{text:reply,chips:[]};
    }catch(err){
      // Netwerk fout: val terug op lokale engine
      const local=Chat.respond(userText,ud,cks,sess,ctx);
      return local||{text:"Verbindingsfout. Probeer het opnieuw.",chips:[]};
    }
  }

  // ── Geen API key: gebruik lokale Chat engine ──
  const local=Chat.respond(userText,ud,cks,sess,ctx);
  return local||{text:"Typ je vraag. De spiegel luistert.",chips:["Hoe gaat het met mij?","Wat is BEWEEG?","Mijn Canon nu"]};
}

        const deep=this._getDeepResponse(last,ud,cks,sess,context);
        if(deep){state.chatLastTopic={topic:last.topic+"_deep",ctx:context};return deep}
      }
    }

    // ── Context-specifieke routing ──
    let r=null;
    if(context==="ontdekken")r=this.ontdekken(q);
    else if(context==="spiegel"&&ud&&ud.matchScore)r=this.spiegel(q,ud,cks||[],sess||[]);
    else if(context==="terugkomst"&&ud)r=this.terugkomst(q,ud,cks||[],sess||[]);
    else if(context==="evaluatie"&&ud)r=this.evaluatie(q,ud,cks||[],sess||[]);

    if(r){state.chatLastTopic={topic:r.src,ctx:context};return r}

    // ── Cross-context: probeer alles ──
    r=this.ontdekken(q);
    if(r){state.chatLastTopic={topic:r.src,ctx:"ontdekken"};return r}
    if(ud&&ud.matchScore){r=this.spiegel(q,ud,cks||[],sess||[]);if(r){state.chatLastTopic={topic:r.src,ctx:"spiegel"};return r}}

    // ── Fuzzy keyword matching als vangnet ──
    const fuzzy=this._fuzzyMatch(q);
    if(fuzzy){
      // Probeer ontdekken met het gevonden topic als zoekvraag
      const fq=fuzzy.replace(/_/g," ");
      r=this.ontdekken(fq);
      if(r){state.chatLastTopic={topic:r.src,ctx:context};return r}
      // Probeer KB direct
      if(KB[fuzzy]){state.chatLastTopic={topic:fuzzy,ctx:context};return{text:KB[fuzzy],chips:["Vertel meer","Hoe werkt het systeem?","Wat is de Canon?"],src:"Kennisbank: "+fuzzy}}
    }

    // ── Pre-match fallback ──

    state.chatLastTopic={topic:"pre",ctx:context};

  // ── SPIEGEL: gesprek met jezelf ──
  spiegel(q,ud,cks,sess){
    const a=Spiegel.analyzeCheckins(cks);const se=Spiegel.analyzeSessions(sess);

      }

    if(q.match(/wat moet|wat nu|advies|help|wat.*doen/)){

      let t="Dat is ook goed. Je hoeft het niet te weten. ";
      t+="Soms is er iets en je kan het niet benoemen. Dat is niet raar. Dat is eerlijk. Probeer dit: hoe voel je je nu? Eén woord. Of twee. Meer hoeft niet.";
      return{text:t,chips:["Moe","Onrustig","Leeg","Vastgelopen"],src:"Spiegel: onbekend gevoel"};
    }

    // Blok afgerond / klaar / gedaan
    if(q.match(/blok afgerond|afgerond|klaar|gedaan|gelukt|gehaald|voltooid|check|done/i)){
      const bc=state.blocksCompleted||0;
      let t="Gezien. ";
      if(bc>=12) t+="Je hebt "+bc+" blokken afgerond. Dat is niet niks. Je werkt eraan. Dat is het verschil.";
      else if(bc>=6) t+=bc+" blokken klaar. Je bouwt iets op. Elke stap telt.";
      else if(bc>=1) t+="Eerste blokken gedaan. Het begin is er. Ga door.";
      else t+="Je bent bezig. Dat is wat telt.";
      return{text:t,chips:["Mijn progressie","Volgende blok","Hoe gaat het met mij?"],src:"Spiegel: blok afgerond"};
    }

    // Motivatie / doorzetten
    if(q.match(/motivatie|geen zin|moeilijk vol.*houden|opgeven|stoppen|lukt.*niet/)){
      let t="Motivatie is geen voorwaarde. Consistentie wel. ";
      if(a.consistency>=60) t+="En jij bent "+a.consistency+"% consistent. Dat is niet motivatie. Dat ben jij. ";
      else t+="Je bent er "+a.consistency+"% van de tijd. Dat is eerlijk. Maar niet genoeg om het te voelen. ";
      t+="Wat heb je nu nodig?";
      return{text:t,chips:["Iets anders proberen","Minder druk","Gewoon doorgaan","Ik weet het niet"],src:"Spiegel: motivatie"};
    }

    // Lichaam / fysiek
    if(q.match(/pijn|blessure|moe|slaap|energie|lichaam|rug|knie|schouder|hoofd/)){
      let t="Je lichaam praat. Luister. ";
      t+="Dit is geen zwakte. Dit is informatie. Wat voel je precies? En hoe lang al?";
      return{text:t,chips:["Al een tijdje","Net begonnen","Komt en gaat","Het wordt erger"],src:"Spiegel: lichaam"};
    }

    // Twijfel / onzekerheid
    if(q.match(/twijfel|onzeker|bang|durf.*niet|angst|stress/)){
      let t="Twijfel is niet het probleem. Twijfel is het begin. ";
      t+="Iedereen die iets wil veranderen twijfelt. De vraag is niet of je twijfelt. De vraag is: wat doe je ermee?";
      return{text:t,chips:["Ik wil door ondanks twijfel","Wat als het niet lukt","Ik heb steun nodig","Het voelt te veel"],src:"Spiegel: twijfel"};
    }

    // Trots / progressie / resultaat
    if(q.match(/resultaat|progressie|vooruit|veranderd|beter|gelukt|anders/)){
      let t="Je vraagt naar resultaat. De data: week "+weeks+", "+a.consistency+"% consistent";
      if(a.trend==="stijgend") t+=", trend stijgend. Je groeit.";
      else if(a.trend==="dalend") t+=", trend dalend. Maar je bent er. Dat telt.";
      else t+=". Stabiel. Dat is ook resultaat.";
      t+=" Wat wil je weten?";
      return{text:t,chips:["Mijn Canon nu","Mijn progressie","Wat kan ik meer","Hoe verder"],src:"Spiegel: resultaat"};
    }

    // Eén-woord emoties (follow-up van "hoe voel je je")
    if(q.match(/^(moe|onrustig|leeg|vastgelopen|boos|verdrietig|gefrustreerd|rustig|oké|ok|oke|goed|prima|matig|slecht)$/i)){
      const emo=q.toLowerCase().trim();
      const neg=["moe","onrustig","leeg","vastgelopen","boos","verdrietig","gefrustreerd","slecht","matig"].includes(emo);
      if(neg){
        let t="Je zegt: "+emo+". Dat is eerlijk. ";
        t+="Niet alles hoeft nu opgelost. Maar het is gezien. Wat zit erachter?";
        return{text:t,chips:["Werk","Privé","Lichaam","Weet ik niet"],src:"Spiegel: emotie"};
      } else {
        let t="Je zegt: "+emo+". Mooi. ";
        t+="Vasthouden. "+a.consistency+"% consistent. De basis staat.";
        return{text:t,chips:["Ik wil meer","Mijn progressie","Mijn Canon nu"],src:"Spiegel: positief emotie"};
      }
    }

    // Forward to ontdekken for system questions
    const kb=this.ontdekken(q);if(kb)return kb;

    // LLM-fallback met Canon/Drive context
    const da=ud.driveAns||{};
    const canonCtx=shifted?"WIJ:"+shifted.WIJ+"% KIEZEN:"+shifted.KIEZEN+"% INVESTEREN:"+shifted.INVESTEREN+"%":"onbekend";
    const driveCtx=da.D1?(Array.isArray(da.D1)?da.D1.join(", "):da.D1):"onbekend";
    const fallbackCtx=name+". Canon: "+canonCtx+". Drive: "+driveCtx+". Week "+weeks+", "+a.consistency+"% consistent, trend "+a.trend+".";
    return{text:fallbackCtx+" Ik heb je gehoord. Zeg meer, dan kan de spiegel meer teruggeven.",chips:["Ik wil ergens aan werken","Hoe gaat het met mij?","Ik zit ergens mee","Mijn Canon"],src:"Spiegel"};
  },

  // ── TERUGKOMST: data + empathie ──
  terugkomst(q,ud,cks,sess){
    const a=Spiegel.analyzeCheckins(cks);const name=ud.name||"jij";const weeks=Math.ceil((cks.length||0)/2);

    if(q.match(/druk|tijd|werk|geen tijd/))
      return{text:"Druk is wat er altijd is. De vraag is niet of je tijd hebt \u2014 maar of je het wilt maken. Je was "+a.gaps+" check-ins afwezig. Het systeem draait door, maar het mist jouw input. Wat heb je nodig om terug te komen?",
        chips:["Ik wil door","Minder vaak","Ik twijfel"],src:"Terugkomst: druk | "+a.gaps+" gaps"};

    if(q.match(/motivatie|weg|kwijt|geen zin/))
      return{text:"Motivatie was nooit het punt. Consistentie wel. En die is even weg \u2014 dat is data, geen falen. Je Canon verschuift mee. Je INVESTEREN staat op "+(Spiegel.shiftCanon(ud.canonScores,cks,sess).INVESTEREN)+"%. De vraag: wil je nog? Ja of nee. Beiden zijn goed.",
        chips:["Ja ik wil door","Ik weet het niet","Nee"],src:"Terugkomst: motivatie"};

    if(q.match(/weet.*niet|geen idee|moeilijk/))
      return{text:"Dat is eerlijk. Je hoeft het niet te weten. Het systeem heeft data. Week "+weeks+". "+a.gaps+" gemiste check-ins. Trend: "+a.trend+". Wat we weten: je was er, en toen niet meer. Wat er tussen zit \u2014 dat is jouw verhaal. Wil je het delen?",
        chips:["Ja","Liever niet","Ik wil gewoon door"],src:"Terugkomst: onbekend"};

    if(q.match(/door|terug|opnieuw|weer/))
      return{text:"Welkom terug. Geen oordeel. Geen achterstand. Het systeem pakt op waar je bent, niet waar je was. Vul je check-in in. Kom naar je sessie. De rest volgt.",
        chips:["Hoe gaat het met mij?","Wat moet ik doen?"],src:"Terugkomst: herstart"};

    return{text:name+", je bent terug. Dat telt. Wat speelt er?",chips:["Ik had het druk","Motivatie was weg","Ik weet het niet","Ik wil gewoon door"],src:"Terugkomst"};
  },

  // ── EVALUATIE: volledige review ──
  evaluatie(q,ud,cks,sess){
    const a=Spiegel.analyzeCheckins(cks);const se=Spiegel.analyzeSessions(sess);
    const shifted=Spiegel.shiftCanon(ud.canonScores,cks,sess);const orig=ud.canonScores;
    const weeks=Math.ceil((cks.length||0)/2);const name=ud.name||"jij";const sigs=Spiegel.getSignals(ud,cks,sess);

    if(q.match(/status|volledig|alles|overzicht|waar sta/)){
      let t=name+". Evaluatie week "+weeks+". ";
      t+="Route: "+(ud.route||"onbekend")+". Match: "+ud.matchScore+"%. ";
      t+="Consistentie: "+a.consistency+"%. Sessies: "+se.rate+"% aanwezig. Trend: "+a.trend+". ";
      t+="Canon: WIJ "+shifted.WIJ+"%, KIEZEN "+shifted.KIEZEN+"%, INVESTEREN "+shifted.INVESTEREN+"%. ";
      const changes=["WIJ","KIEZEN","INVESTEREN"].map(k=>{const d=shifted[k]-orig[k];return d!==0?k+" "+(d>0?"+":"")+d+"%":null}).filter(Boolean);
      if(changes.length)t+="Verschuivingen: "+changes.join(", ")+". ";
      if(sigs.length)t+=sigs.length+" signaal"+(sigs.length>1?"en":"")+": "+sigs.map(s=>s.text).join(" ");
      else t+="Geen signalen. Stabiel.";
      return{text:t,chips:["Wat is er veranderd?","Mijn progressie","Wat nu?"],src:"Evaluatie: week "+weeks};
    }

    if(q.match(/verandert|verschil|verschuiv|anders/)){
      const changes=["WIJ","KIEZEN","INVESTEREN"].map(k=>{
        const d=shifted[k]-orig[k];if(d===0)return k+": stabiel ("+shifted[k]+"%)";
        const label=k==="WIJ"?"cultuur":k==="KIEZEN"?"relatie":"ontwikkeling";
        return k+" ("+label+"): "+(d>0?"+":"")+d+"% \u2014 van "+orig[k]+"% naar "+shifted[k]+"%"
      });
      let t="Canon verschuiving sinds start. "+changes.join(". ")+". ";
      t+="Dit verschuift op basis van gedrag: check-ins, aanwezigheid, sessiedata. Niet op basis van wat je zegt.";
      return{text:t,chips:["Mijn volledige status","Wat nu?"],src:"Evaluatie: verschuiving"};
    }

    if(q.match(/progressie|vooruitgang|oefening/)){
      let t="";
      if(se.progressions.length>0)t="Progressie: "+se.progressions.map(p=>p.name+": "+p.from.w+" \u2192 "+p.to.w).join(". ")+". ";
      else t="Nog geen meetbare progressie in oefeningen. ";
      t+="Aanwezigheid: "+se.rate+"%. "+(se.rate>=80?"Dat is sterk.":se.rate>=60?"Ruimte voor meer.":"Onder de 60%. Dat beperkt progressie.");
      return{text:t,chips:["Mijn volledige status","Wat nu?"],src:"Evaluatie: progressie"};
    }

    if(q.match(/wat nu|verder|door|volgende|wat.*doen/)){
      let t="";
      const inv=shifted.INVESTEREN;const cons=a.consistency;
      if(cons>=75&&inv>=60){
        t="Sterk. Consistentie "+cons+"%, INVESTEREN "+inv+"%. ";
        const nextEval=[2,6,12,24].find(w=>w>weeks);
        t+="Advies: doorgaan op huidige route ("+ud.route+"). "+(nextEval?"Volgende evaluatie: week "+nextEval+".":"Laatste evaluatie bereikt.");
        if(inv>=75)t+=" Overweeg zwaardere belasting.";
      }else if(cons>=50){
        t="Basis staat. Consistentie "+cons+"%, INVESTEREN "+inv+"%. ";
        t+="Advies: focus op aanwezigheid. Elke sessie is data. ";
        if(inv<50)t+="INVESTEREN is laag. Niet harder \u2014 eerlijker. Bespreek met je trainer wat je nodig hebt.";
      }else{
        t="Consistentie "+cons+"%. Dat is onder de helft. ";
        t+="Het systeem werkt op data \u2014 zonder aanwezigheid geen sturing. ";
        t+="Advies: 1 ding \u2014 kom naar je sessies. De rest volgt. Als de route niet past, kan die verschuiven.";
      }
      return{text:t,chips:["Mijn Canon nu","Mijn volledige status"],src:"Evaluatie: advies"};
    }

    // Forward to spiegel for personal questions
    const sp=this.spiegel(q,ud,cks,sess);if(sp)return sp;

    return{text:name+". Evaluatie week "+weeks+". Wat wil je weten?",chips:["Mijn volledige status","Wat is er veranderd?","Mijn progressie","Wat nu?"],src:"Evaluatie"};
  }
};

  canvas:null            // wordt gevuld bij role-select of loadState
};

function getOnboardStep(){
  const steps=["consent","canon","canon-result","drive","match"];
  return steps.indexOf(state.scr);
}

function updateProgress(step,total){
  const pct=(step/total)*100;
  const progressBar=$("app")?.querySelector(".onboard-progress");
  if(progressBar){
    const fill=progressBar.querySelector(".onboard-fill");
    if(fill)fill.style.width=pct+"%";
  }
}

// Auto-save: throttled, slaat op bij elke render maar max 1x per 2 seconden
let _lastAutoSave=0;
function autoSave(){
  if(state.demo)return;
  const now=Date.now();
  if(now-_lastAutoSave<2000)return;
  _lastAutoSave=now;
  saveState();
}

// Vangnet: sla op als iemand de tab sluit of wegnavigeeert
window.addEventListener("beforeunload",()=>{if(!state.demo)saveState()});
// Vangnet mobiel: sla op als app naar achtergrond gaat
document.addEventListener("visibilitychange",()=>{if(document.hidden&&!state.demo)saveState()});

function render(){
  // Cleanup canon timer als we niet meer op canon scherm zitten
  if(state.scr!=="canon"&&state.canonTimerId){clearInterval(state.canonTimerId);state.canonTimerId=null;}
  $("app").innerHTML="";
  const screen=buildScreen();
  $("app").append(screen);
  // Demo walkthrough overlay
  const oldWt=document.querySelector(".wt-overlay");
  if(oldWt) oldWt.remove();
  const wt=renderWT();
  if(wt) document.body.append(wt);

  // Update progress bar for onboarding
  const step=getOnboardStep();
  if(step>=0&&step<9){
    const progressBar=h("div",{class:"onboard-progress"},h("div",{class:"onboard-fill",style:{width:(step/9)*100+"%"}}));
    $("app").prepend(progressBar);
    updateProgress(step,9);
  }

  // Auto-save na elke render
  autoSave();
}

function _stateKey(){return state.demo?'beweeg_demo':'beweeg_state'}

function saveState(){
  if(state.demo)return; // Nooit demo data opslaan
  const toSave={
    canonAns:state.canonAns,
    driveAns:state.driveAns,
    baseline:state.baseline,
    matchResult:state.matchResult,
    ud:state.ud,
    role:state.role,
    scr:state.scr,
    blocksDone:state.blocksDone,
    blocksDoneDate:state.blocksDoneDate,
    chatMsgs:state.chatMsgs,
    goals:state.goals,
    goalsSet:state.goalsSet,
    blocksCompleted:state.blocksCompleted,
    spiegelMemory:state.spiegelMemory,
    startDate:state.startDate,
    trialActive:state.trialActive,
    evalDone:state.evalDone,
    evalAnswer:state.evalAnswer,
    evalDate:state.evalDate,
    cks:state.cks,
    sess:state.sess,
    // V8
    customGoals:state.customGoals,
    goalProgress:state.goalProgress,
    goalMilestones:state.goalMilestones,
    // V9: Canvas
    canvas:state.canvas,
    _canvasVersion:9
  };
  localStorage.setItem('beweeg_state',JSON.stringify(toSave));
}

function loadState(){
  try{
    const saved=localStorage.getItem('beweeg_state');
    if(saved){
      const data=JSON.parse(saved);
      Object.assign(state,data);
      state.demo=false; // Nooit demo state laden vanuit opslag
      // V9: Migreer V8 state naar Canvas als er geen canvas is
      if(!state.canvas&&state.role){
        state.canvas=Canvas.fromState(state);
        console.log('[V9] Canvas gemigreerd vanuit V8 state',state.canvas);
      }
      // V9: Ensure canvas.we.bewegingBlokken exists and is populated
      if(state.canvas){
        if(!state.canvas.we)state.canvas.we={route:{basis:null,addOn:null},training:{sessies:[],aanwezigheid:null},ontwikkelblokken:[],bewegingBlokken:[]};
        if(!state.canvas.we.bewegingBlokken)state.canvas.we.bewegingBlokken=[];
        // Als match ja maar geen blokken: genereer ze alsnog
        if(state.canvas.we.bewegingBlokken.length===0&&state.canvas.be.match&&state.canvas.be.match.uitkomst!=="nee"&&state.canvas.be.canon.scores&&state.canvas.be.drive.antwoorden){
          state.canvas.we.bewegingBlokken=generateBewegingBlokken(state.canvas);
          console.log('[V9] bewegingBlokken alsnog gegenereerd:',state.canvas.we.bewegingBlokken.length);
        }
      }
    }
  }catch(e){
    console.log('Failed to load state:',e);
  }
}

function saveProfile(naam,rol){
  const profiles=loadProfiles();
  const key=naam.toLowerCase().replace(/\s/g,"-")+"-"+rol;
  profiles[key]={
    naam,rol,key,
    savedAt:Date.now(),
    canonAns:{...state.canonAns},
    canonTimes:{...state.canonTimes},
    canonScores:state.ud?{...state.ud.canonScores}:state.canonSc?{...state.canonSc}:null,
    driveAns:{...state.driveAns},
    driveScore:state.ud?state.ud.driveScore:null,
    matchScore:state.ud?state.ud.matchScore:null,
    matchReject:state.matchResult?state.matchResult.reject:null,
    baseline:state.baseline?{...state.baseline}:null,
    devGoals:state.devGoals?{...state.devGoals}:null,
    route:state.ud?state.ud.route:null,
    startDate:state.startDate,
    cks:state.cks?[...state.cks]:[],
    sess:state.sess?[...state.sess]:[],
    canvas:state.canvas?JSON.parse(JSON.stringify(state.canvas)):null,
    weekNum:state.weekNum
  };
  localStorage.setItem("beweeg_profiles",JSON.stringify(profiles));
  return key;
}

function loadProfiles(){
  try{
    const raw=localStorage.getItem("beweeg_profiles");
    return raw?JSON.parse(raw):{};
  }catch(e){return{}}
}

function deleteProfile(key){
  const profiles=loadProfiles();
  delete profiles[key];
  localStorage.setItem("beweeg_profiles",JSON.stringify(profiles));
}

function updateProfile(key){
  const profiles=loadProfiles();
  if(!profiles[key])return;
  profiles[key].savedAt=Date.now();
  profiles[key].cks=state.cks?[...state.cks]:[];
  profiles[key].sess=state.sess?[...state.sess]:[];
  profiles[key].canvas=state.canvas?JSON.parse(JSON.stringify(state.canvas)):null;
  profiles[key].weekNum=state.weekNum;
  if(state.ud){
    profiles[key].matchScore=state.ud.matchScore;
    profiles[key].route=state.ud.route;
  }
  localStorage.setItem("beweeg_profiles",JSON.stringify(profiles));
}

      ):null,
      // 2-weken data
      h("div",{class:"stats",style:{marginBottom:"8px"}},
        h("div",{class:"stat"},h("div",{class:"stat-v"},dagen),h("div",{class:"stat-l"},"Dagen")),
        h("div",{class:"stat"},h("div",{class:"stat-v"},checkins),h("div",{class:"stat-l"},"Check-ins")),
        h("div",{class:"stat"},h("div",{class:"stat-v"},sessies),h("div",{class:"stat-l"},"Sessies")),
        h("div",{class:"stat"},h("div",{class:"stat-v"},gemist),h("div",{class:"stat-l"},"Gemist"))
      ),

function renderWT(){
  if(state._demoWalk==null||!state.demo) return null;
  const step=WT_STEPS[state._demoWalk];
  if(!step) return null;
  if(step.tab&&state.tab!==step.tab){state.tab=step.tab;}
  const n=state._demoWalk+1;const tot=WT_STEPS.length;const last=n>=tot;
  const ov=h("div",{class:"wt-overlay"});
  const c=h("div",{class:"wt-card"});
  c.append(h("div",{class:"wt-step"},n+"/"+tot));
  c.append(h("div",{class:"wt-title"},step.t));
  c.append(h("div",{class:"wt-body"},step.b));
  const btns=h("div",{class:"wt-btns"});
  if(!last){
    btns.append(h("button",{class:"wt-btn",onClick:()=>{state._demoWalk++;const nx=WT_STEPS[state._demoWalk];if(nx&&nx.tab)state.tab=nx.tab;render();}},"Volgende"));
    btns.append(h("button",{class:"wt-skip",onClick:()=>{delete state._demoWalk;render();}},"Sla over"));
  }else{
    btns.append(h("button",{class:"wt-btn",onClick:()=>{delete state._demoWalk;render();}},"Bekijk de app"));
  }
  c.append(btns);ov.append(c);return ov;
}

function getCanonSet(){
  // Tier 1 bij start, tier 1+2 bij evaluatie (als weekNum >= 12)
  return state.weekNum>=12?CANON:CANON.filter(c=>c.tier===1);
}

function buildCanon(){
  const s=state;const set=getCanonSet();const cur=set[s.canonIdx];const pct=s.canonTimerVal/80;const dashOff=141.37*(1-pct);
  if(!s.canonTimerId){
    s.canonStart=Date.now();
    s.canonTimerId=setInterval(()=>{
      s.canonTimerVal--;
      const timerEl=document.querySelector(".canon-timer");
      if(timerEl){
        const numEl=timerEl.querySelector(".tnum");if(numEl)numEl.textContent=Math.ceil(s.canonTimerVal/10);
        const fl=timerEl.querySelector(".fl");if(fl)fl.style.strokeDashoffset=141.37*(1-s.canonTimerVal/80);
        if(s.canonTimerVal<20)timerEl.classList.add("warn");else timerEl.classList.remove("warn");
      }
      if(s.canonTimerVal<=0){canonPick("twijfel")}
    },100);
  }
  return h("div",{class:"app"},
    h("div",{class:"hdr"},logoEl({})),
    h("div",{class:"main"},h("div",{class:"scr",style:{textAlign:"center"}},
      h("div",{class:"label",style:{marginBottom:"6px"}},cur.fase+" \u2014 "+cur.blok),
      h("div",{style:{fontSize:"9px",fontWeight:"700",letterSpacing:".16em",textTransform:"uppercase",color:"var(--ghost)",marginBottom:"12px"}},(s.canonIdx+1)+"/"+set.length),
      h("div",{class:"canon-timer"+(s.canonTimerVal<20?" warn":""),html:'<svg viewBox="0 0 48 48"><circle class="trk" cx="24" cy="24" r="22.5"/><circle class="fl" cx="24" cy="24" r="22.5" style="stroke-dashoffset:'+dashOff+'"/></svg><span class="tnum">'+Math.ceil(s.canonTimerVal/10)+'</span>'}),
      h("div",{class:"canon-q"},cur.s),
      h("div",{class:"canon-btns"},
        s.canonIdx>0?h("button",{class:"btn-ghost",style:{marginBottom:"6px"},onClick:()=>{clearInterval(state.canonTimerId);state.canonTimerId=null;state.canonIdx--;state.canonTimerVal=80;delete state.canonAns[getCanonSet()[state.canonIdx].id];render()}},"Terug"):null,
        h("button",{"aria-label":"Ja, ik herken dit","onClick":()=>canonPick("ja")},"Ja"),
        h("button",{class:"tw","aria-label":"Twijfel, niet helemaal zeker","onClick":()=>canonPick("twijfel")},"Twijfel"),
        h("button",{"aria-label":"Nee, ik herken dit niet","onClick":()=>canonPick("nee")},"Nee")
      )
    ))
  );
}

function canonPick(v){
  clearInterval(state.canonTimerId);state.canonTimerId=null;
  const set=getCanonSet();
  const elapsed=Date.now()-state.canonStart;
  state.canonAns[set[state.canonIdx].id]=v;
  state.canonTimes[set[state.canonIdx].id]=elapsed;
  if(state.canonIdx<set.length-1){state.canonIdx++;state.canonTimerVal=80;render()}
  else{state.canonSc=calcCanon(state.canonAns,state.canonTimes);if(state.canvas)Canvas.writeCanon(state.canvas,state.canonAns,state.canonTimes);saveState();state.scr="canon-result";state.canonRefl=null;render()}
}

function buildDevGoals(){

  // Alle blokken met data — niet alleen zwakke. Jij kiest waar je aan werkt.
  const zwakke=Object.entries(bs).filter(([k,v])=>v>0).sort((a,b)=>a[1]-b[1]);

  const blok=cur[0];const score=cur[1];

  const fase=meta?meta.fase:"";

  // Stellingen in dit blok

    h("div",{class:"hdr"},logoEl({})),

      meta&&meta.verdieping?h("div",{style:{marginTop:"8px",cursor:"pointer"},onClick:e=>{
        const el=e.currentTarget.querySelector(".dg-detail");

      h("div",{style:{display:"flex",flexDirection:"column",gap:"6px"}},
        h("button",{style:{padding:"16px 18px",border:"1.5px solid var(--ink)",background:keuze==="devGoal"?"var(--ink)":"var(--white)",color:keuze==="devGoal"?"var(--white)":"var(--ink)",font:"600 13px 'Montserrat',sans-serif",cursor:"pointer",textAlign:"left",transition:"all .15s"},onClick:()=>{
          state.devGoals[blok]="devGoal";render();

        h("button",{class:"btn",disabled:!keuze,onClick:()=>{

function buildDriveStep(){
  const qs=DRIVE[state.role]||DRIVE.klant;
  // showIf: sla stappen over die niet van toepassing zijn
  let q=qs[state.driveIdx];
  while(q&&q.showIf&&!q.showIf(state.driveAns)){
    // Verwijder antwoord van overgeslagen vraag
    delete state.driveAns[q.id];
    if(state.driveIdx<qs.length-1){state.driveIdx++;q=qs[state.driveIdx]}else{saveState();state.scr="match";state.matchRefl=null;state.matchName="";render();return null}
  }
  const val=state.driveAns[q.id];
  const ok=q.t==="info"?true:val!==undefined&&val!==""&&val!==null&&(Array.isArray(val)?val.length>0:true);
  const next=()=>{if(state.driveIdx<qs.length-1){state.driveIdx++;render()}else{saveState();state.scr="match";state.matchRefl=null;state.matchName="";render()}};
  const toggleM=(o)=>{const c=state.driveAns[q.id]||[];state.driveAns[q.id]=c.includes(o)?c.filter(x=>x!==o):[...c,o];render()};
  return h("div",{class:"app"},
    h("div",{class:"hdr"},logoEl({})),
    h("div",{class:"main"},h("div",{class:"scr"},

      q.t==="budget"?h("div",{class:"opts"},...q.o.map(o=>h("button",{class:"opt"+(state.driveAns[q.id]===o?" sel":""),onClick:()=>{state.driveAns[q.id]=o;render()}},o))):null,
      q.t==="info"?h("div",{class:"card",style:{marginTop:"10px"}},h("div",{class:"body-text"},"Kostendekking. Geen winst.")):null,
      h("div",{style:{display:"flex",gap:"6px",marginTop:"20px"}},

  const main=h("div",{class:"main",role:"main"});
  if(showNav){

    if(s._showCheckin)main.append(buildCheckinFlow());
    else if(s.tab==="chat")main.append(buildChatView());
    else if(s.tab==="route")main.append(buildRouteTab());
    else if(s.tab==="waarom")main.append(buildWaaromTab());
    else if(s.tab==="dashboard")main.append(buildDashboard());
