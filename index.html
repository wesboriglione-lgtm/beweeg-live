function buildChatView(){
  const s=state;const hasMatch=s.ud&&s.ud.matchScore;
  const isFirstOpen=s.chatMsgs.length===0;

  // Init
  if(isFirstOpen){
    if(hasMatch){
      const a=Spiegel.analyzeCheckins(s.cks);const weeks=Math.ceil((s.cks.length||0)/2);const name=s.ud.name;
      const isVeryFirst=!s.cks||s.cks.length===0;
      const isEvalWeek=[2,6,12,24].includes(weeks);
      const isAbsent=a.gaps>=3;

      if(isVeryFirst){
        // ── Eerste keer na match — context vanuit actief beweging-blok ──
        const cv=s.canvas;
        const actiefBlok=cv&&cv.we&&cv.we.bewegingBlokken?cv.we.bewegingBlokken.find(b=>b.status==="actief"):null;
        const ud2=s.ud;const da2=s.driveAns||ud2.driveAns||{};
        const d1Items=Array.isArray(da2.D1)?da2.D1.filter(Boolean):[da2.D1].filter(Boolean);
        const topFase=ud2.canonScores?["WIJ","KIEZEN","INVESTEREN"].sort((a,b)=>ud2.canonScores[b]-ud2.canonScores[a])[0]:null;
        const lowFase=ud2.canonScores?["WIJ","KIEZEN","INVESTEREN"].sort((a,b)=>ud2.canonScores[a]-ud2.canonScores[b])[0]:null;
        const faseMap={WIJ:"hoe je kijkt",KIEZEN:"hoe je kiest",INVESTEREN:"wat je investeert"};
        // Spiegel weet waar je bent — zegt het direct
        let personalLine=name+".";
        const blokScoresInit=(s.canonAns||ud2.canonAns)?canonBlokScores(s.canonAns||ud2.canonAns):{};
        const zwaksteBlok=Object.entries(blokScoresInit).filter(([k,v])=>v>0).sort((a,b)=>a[1]-b[1])[0];
        if(actiefBlok&&d1Items.length>0){
          personalLine=name+". Je wil "+d1Items[0].toLowerCase()+". "+actiefBlok.titel+" is waar we beginnen.";
        }else if(d1Items.length>0&&zwaksteBlok){
          personalLine=name+". Je wil "+d1Items[0].toLowerCase()+". "+zwaksteBlok[0]+" staat op "+zwaksteBlok[1]+"%. Daar zit ruimte.";
        }else if(d1Items.length>0){
          personalLine=name+". Je wil "+d1Items[0].toLowerCase()+".";
        }
        let routeLine="Ik ken je Canon. Ik ken je Drive. Dit is waar we samen aan werken.";
        if(actiefBlok){
          routeLine="Ik weet wat je hebt ingevuld. Dit is de plek waar we eraan werken. Samen.";
        }else if(lowFase&&topFase!==lowFase){
          routeLine="Je route begint bij "+(faseMap[lowFase]||lowFase)+". Daar zit de meeste beweging.";
        }
        s.chatMsgs=[
          {t:"sys",text:personalLine,chips:[]},
          {t:"sys",text:routeLine,chips:[]},
          {t:"sys",text:"Waar wil je beginnen?",chips:actiefBlok?[actiefBlok.titel,"BEWEEG JE?","Iets anders"]:["Hoe gaat het met mij?","Mijn beweging","Ik zit ergens mee"]}
        ];
      }else{
        let main=name+". ";
        const prev=Spiegel.getPreventieSignals(s.ud,s.cks,s.blocksCompleted,s.spiegelMemory,s.startDate);
        const earlySignal=prev.length>0?prev[0]:null;
        if(earlySignal)main+=earlySignal.text+". "+earlySignal.action;
        else if(isAbsent)main+="Je was even weg. De spiegel draait door. Wat speelt er?";
        else if(isEvalWeek)main+="Evaluatieweek. Tijd om stil te staan bij wat er is.";
        else if(a.pattern==="consistentie")main+=a.streak+"x op rij. De data bevestigt wat je doet.";
        else if(a.pattern==="herhaald-lastig")main+=a.lastigRecent+"x lastig. De spiegel ziet het. Vertel.";
        else{const cvRet=s.canvas;const actiefRet=cvRet&&cvRet.we&&cvRet.we.bewegingBlokken?cvRet.we.bewegingBlokken.find(b=>b.status==="actief"):null;if(actiefRet)main+="Je werkt aan "+actiefRet.titel+". Waar staan we?";else main+="De spiegel is er. Wat speelt er?";}
        s.chatMsgs=[{t:"sys",text:main,chips:["Hoe gaat het met mij?","Mijn blokken","Mijn Canon nu"]}];
      }
    }else{
      s.chatMsgs=[{t:"sys",text:"Welkom bij BEWEEG.",chips:["Wat is BEWEEG?","Hoe werkt het?","Ik wil starten"]}];
    }
  }

  const wrap=h("div",{class:"chat-wrap"});

  // ═══ V9: Spiegel header — actief blok context of starter blocks ═══

      const sg=h("div",{style:{display:"flex",gap:"6px"}});
      [{text:"BEWEEG JE?",sub:"Check-in",send:"BEWEEG JE?"},{text:"Ik zit ergens mee",sub:"Delen",send:"Ik zit ergens mee"}].forEach(b=>{
        sg.append(h("div",{style:{flex:"1",background:"var(--bg)",padding:"14px",cursor:"pointer",minHeight:"52px",display:"flex",flexDirection:"column",justifyContent:"space-between",transition:"background .15s"},onClick:()=>chatSend(b.send),onMouseenter:e=>{e.currentTarget.style.background="var(--bg)"},onMouseleave:e=>{e.currentTarget.style.background="var(--bg)"}},
          h("div",{style:{fontSize:"12px",fontWeight:"800",color:"var(--ink)",lineHeight:"1.3"}},b.text),
          h("div",{style:{fontSize:"9px",fontWeight:"600",color:"var(--ghost)",marginTop:"6px"}},b.sub)
        ));
      });
      top.append(sg);
    }
    wrap.append(top);
  }

  const msgs=h("div",{class:"chat-msgs"});
  s.chatMsgs.forEach(m=>{
    const cls=m.t==="intro"?"intro":m.t;
    let displayText=m.text;
    let bronnen=[];
    if(m.t==="sys"){
      const lines=m.text.split("\n");
      const bodyLines=[];
      lines.forEach(l=>{
        const bm=l.match(/^\[bron:\s*(.+)\]$/);
        if(bm){bronnen.push(bm[1])}else{bodyLines.push(l)}
      });
      displayText=bodyLines.join("\n").trim();
    }
    const bub=h("div",{class:"mbub "+cls});
    bub.textContent=displayText;
    const msgDiv=h("div",{class:"msg "+(m.t==="intro"?"sys":m.t)},bub);
    const row=h("div",null,msgDiv);
    if(bronnen.length){
      row.append(h("div",{class:"bron-wrap"},...bronnen.map(b=>h("div",{class:"bron-line"},b))));
    }
    if(m.t==="sys"&&m.chips&&m.chips.length)row.append(h("div",{class:"chips"},...m.chips.map(c=>h("button",{class:"chip",onClick:()=>chatSend(c)},c))));
    msgs.append(row);
  });
  wrap.append(msgs);

  // Chat input — altijd zichtbaar, ruim, auto-focus
  // Community indicator
  wrap.append(h("div",{style:{display:"flex",justifyContent:"center",gap:"16px",padding:"4px 20px",background:"var(--bg)",flexShrink:"0"}},
    h("div",{style:{fontSize:"8px",fontWeight:"600",color:"var(--rule)",letterSpacing:".04em"}},COMMUNITY.checkins_vandaag+" check-ins vandaag"),
    h("div",{style:{fontSize:"8px",fontWeight:"600",color:"var(--rule)",letterSpacing:".04em"}},COMMUNITY.actief.toLocaleString("nl-NL")+" actief")
  ));

  const inputRow=h("div",{class:"chat-input"},
    h("input",{class:"chat-field",placeholder:"Typ hier...",spellcheck:"true",autocomplete:"off",autocapitalize:"sentences",value:s.chatInput||"",disabled:_chatBusy,"aria-label":"Typ je antwoord"}),
    h("button",{class:"chat-send",disabled:_chatBusy,onClick:()=>{const f=wrap.querySelector(".chat-field");if(f.value.trim())chatSend(f.value.trim())}},_chatBusy?"...":"\u2192")
  );
  const field=inputRow.querySelector(".chat-field");
  field.addEventListener("keydown",e=>{if(e.key==="Enter"&&field.value.trim()&&!_chatBusy)chatSend(field.value.trim())});
  wrap.append(inputRow);
  setTimeout(()=>{msgs.scrollTop=msgs.scrollHeight;if(!_chatBusy&&s.chatMsgs.length>0)field.focus()},50);
  return wrap;
}

// ════════════════════════════════════════════════════════════════
// BEWEGING-BLOK SPIEGEL FUNCTIES
// ════════════════════════════════════════════════════════════════

// Vind het actieve beweging-blok in canvas
function getActiefBeweegBlok(){
  const cv=state.canvas;
  if(!cv||!cv.we||!cv.we.bewegingBlokken)return null;
  return cv.we.bewegingBlokken.find(b=>b.status==="actief")||null;
}

// Rond een beweging-blok af in canvas, activeer het volgende
function completeBeweegBlok(blokId){
  const cv=state.canvas;if(!cv||!cv.we||!cv.we.bewegingBlokken)return;
  const bw=cv.we.bewegingBlokken;
  const idx=bw.findIndex(b=>b.id===blokId);
  if(idx<0)return;
  bw[idx].status="afgerond";
  bw[idx].afgerondDatum=Date.now();
  // Activeer volgende open blok
  const volgende=bw.find(b=>b.status==="open");
  if(volgende)volgende.status="actief";
  cv._updated=Date.now();
  // V8 backward compat — completeBlock may not exist in test context
  if(typeof completeBlock==="function")completeBlock(blokId);
}

// Voeg een route-stap toe aan een beweging-blok
function addRouteStap(blokId,stap){
  const cv=state.canvas;if(!cv)return;
  const blok=cv.we&&cv.we.bewegingBlokken?cv.we.bewegingBlokken.find(b=>b.id===blokId):null;
  if(!blok)return;
  blok.routeStappen.push({wat:stap.wat,type:stap.type||"mentaal",datum:Date.now()});
  cv._updated=Date.now();
}

// Voeg een registratie toe aan een beweging-blok
function addRegistratie(blokId,type,tekst){
  const cv=state.canvas;if(!cv)return;
  const blok=cv.we&&cv.we.bewegingBlokken?cv.we.bewegingBlokken.find(b=>b.id===blokId):null;
  if(!blok)return;
  blok.registratie.push({type:type,tekst:tekst,datum:Date.now()});
  cv._updated=Date.now();
}

// Sla spiegel-gesprek op bij blok
function addSpiegelGesprek(blokId,bericht){
  const cv=state.canvas;if(!cv)return;
  const blok=cv.we&&cv.we.bewegingBlokken?cv.we.bewegingBlokken.find(b=>b.id===blokId):null;
  if(!blok)return;
  blok.spiegelGesprek.push({tekst:bericht,datum:Date.now()});
  // Max 30 berichten per blok
  if(blok.spiegelGesprek.length>30)blok.spiegelGesprek.shift();
}

// Stel video-niveau in voor een blok
function setVideoNiveau(blokId,niveauId){
  const cv=state.canvas;if(!cv)return;
  const blok=cv.we&&cv.we.bewegingBlokken?cv.we.bewegingBlokken.find(b=>b.id===blokId):null;
  if(!blok)return;
  blok.videoNiveau=niveauId;
  cv._updated=Date.now();
}

// Bepaal of persoon klaar is voor fysiek op basis van spiegel-gesprekken
function isKlaarVoorFysiek(blokId){
  const cv=state.canvas;if(!cv)return false;
  const blok=cv.we&&cv.we.bewegingBlokken?cv.we.bewegingBlokken.find(b=>b.id===blokId):null;
  if(!blok)return false;
  // Minimaal 2 mentale gesprekken voordat fysiek wordt aangeboden
  return blok.spiegelGesprek.length>=2;
}

// ════════════════════════════════════════════════════════════════
// CHAT SEND — V9 blok-aware
// ════════════════════════════════════════════════════════════════

let _chatBusy=false;
async function chatSend(txt){
  if(_chatBusy)return;
  state.chatMsgs.push({t:"usr",text:txt});
  state.chatInput="";

  // Save key phrases to spiegelMemory
  if(txt.length>10){
    if(!state.spiegelMemory) state.spiegelMemory=[];
    state.spiegelMemory.push({text:txt,date:Date.now()});
    if(state.spiegelMemory.length>20) state.spiegelMemory.shift();
  }

  // "Ik wil starten" shortcut
  if(txt.match(/^(start|begin|ik wil starten|doe mee|ja|doen|zeker)$/i)&&!state.ud){
    state.chatMsgs.push({t:"sys",text:"We beginnen. Canon. 18 stellingen. 8 seconden.",chips:[]});
    render();setTimeout(()=>{state.scr="consent";render()},600);return;
  }

  // ── V9: BLOK OPENEN vanuit BE■ of WE■ ──
  const werkAanMatch=txt.match(/^Ik wil werken aan:\s*(.+)$/i);
  if(werkAanMatch&&state.canvas&&state.canvas.we&&state.canvas.we.bewegingBlokken){
    const titel=werkAanMatch[1].trim();
    const blok=state.canvas.we.bewegingBlokken.find(b=>b.titel===titel&&b.status==="actief");
    if(blok){
      state._spiegelBlok=blok.id; // track welk blok actief is in spiegel
      state._spiegelFase="mentaal"; // start altijd mentaal
      state._spiegelStap=0; // gesprek stap teller
      // Opening vanuit blok context
      const isNieuw=blok.spiegelGesprek.length===0;
      let openTekst="";
      if(blok.bron==="drive"&&blok.bronVeld==="D1"){
        openTekst=isNieuw
          ?blok.titel+". Dit wil je. Voordat je beweegt, eerst kijken. Wat betekent dit voor je?"
          :blok.titel+". Je bent hier eerder geweest. Wat is er veranderd?";
      }else if(blok.bron==="drive"&&blok.bronVeld==="D3"){
        openTekst=isNieuw
          ?blok.titel+". Dit houdt je tegen. Niet oplossen. Eerst begrijpen. Wanneer speelt dit het meest?"
          :blok.titel+". Je werkt hieraan. Wat merk je?";
      }else if(blok.bron==="canon"){
        openTekst=isNieuw
          ?blok.titel+". "+blok.sub+" De spiegel ziet het. Waar merk je dit in je dagelijks leven?"
          :blok.titel+". "+blok.sub+" Wat is er anders dan de vorige keer?";
      }else{
        openTekst=blok.titel+". De spiegel is open. Wat wil je zeggen?";
      }
      const chips=["Vertel meer"];
      chips.push("Ik weet het niet");
      state.chatMsgs.push({t:"sys",text:openTekst,chips:chips});
      addSpiegelGesprek(blok.id,"[open] "+openTekst);
      saveState();render();return;
    }
  }

  // ── V9: BEWEEG JE? vanuit EG■ chips ──
  if(txt==="BEWEEG JE?"){
    state.chatMsgs.push({t:"sys",text:"Hoe is het nu? Kies wat het dichtst bij zit.",chips:["Ik beweeg","Ik sta stil","Ik zit vast"]});
    render();return;
  }
  // BEWEEG JE? antwoorden → Canvas moment
  if(txt==="Ik beweeg"||txt==="Ik sta stil"||txt==="Ik zit vast"){
    const blokMap={"Ik beweeg":"zwart","Ik sta stil":"grijs","Ik zit vast":"lijn"};
    const blokVal=blokMap[txt];
    if(state.canvas)Canvas.writeMoment(state.canvas,blokVal,txt);
    const resp=blokVal==="zwart"?"Goed. Je bent in beweging. De data ziet het."
      :blokVal==="lijn"?"Je zit vast. Dat is ook data. Wat houdt je tegen?"
      :"Je staat stil. Niet erg. Wat heb je nodig om weer te bewegen?";
    const nextChips=blokVal==="zwart"?["Mijn route","Vertel meer"]:["Vertel meer","Mijn route"];
    state.chatMsgs.push({t:"sys",text:resp,chips:nextChips});
    saveState();render();return;
  }

  // ── V9: IK WIL BEWEGEN — fysiek stap, video selectie ──
  if(txt==="Ik wil bewegen"&&state._spiegelBlok){
    const blok=state.canvas&&state.canvas.we&&state.canvas.we.bewegingBlokken?state.canvas.we.bewegingBlokken.find(b=>b.id===state._spiegelBlok):null;
    if(blok&&isKlaarVoorFysiek(blok.id)){
      state._spiegelFase="fysiek";
      const huidigNiveau=blok.videoNiveau;
      if(huidigNiveau){
        const niv=VIDEO_NIVEAUS.find(v=>v.id===huidigNiveau);
        state.chatMsgs.push({t:"sys",text:"Je niveau: "+(niv?niv.label:"onbekend")+". "+(niv?niv.sub:"")+" Klaar?",
          chips:["Start video","Ander niveau","Terug"]});
      }else{
        // Eerste keer: laat niveaus zien
        state.chatMsgs.push({t:"sys",text:"Fysiek. Geen gewichten. Overal. Kies je starttijd.",
          chips:VIDEO_NIVEAUS.slice(0,3).map(v=>v.label)});
      }
      saveState();render();return;
    }else{
      // Nog niet klaar voor fysiek
      state.chatMsgs.push({t:"sys",text:"Eerst mentaal. Het gesprek bepaalt wanneer je beweegt. Niet andersom. Vertel eerst meer over "+((blok?blok.titel:"je beweging"))+".",
        chips:["Vertel meer","Ik weet het niet"]});
      render();return;
    }
  }
  // Fysiek zonder actief blok — pak het eerste actieve blok
  if(txt==="Ik wil bewegen"&&!state._spiegelBlok){
    const actief=getActiefBeweegBlok();
    if(actief){
      state._spiegelBlok=actief.id;
      state._spiegelFase="mentaal";
      state._spiegelStap=0;
      state.chatMsgs.push({t:"sys",text:"Je wil bewegen. Eerst kijken waar je staat. "+actief.titel+". Wat speelt er?",
        chips:[actief.titel,"BEWEEG JE?"]});
    }else{
      state.chatMsgs.push({t:"sys",text:"Nog geen actief blok. Open BE voor je beweging.",chips:["Mijn route"]});
    }
    saveState();render();return;
  }

  // ── V9: VIDEO NIVEAU SELECTIE ──
  const videoMatch=VIDEO_NIVEAUS.find(v=>txt===v.label);
  if(videoMatch&&state._spiegelBlok){
    setVideoNiveau(state._spiegelBlok,videoMatch.id);
    state.chatMsgs.push({t:"sys",text:videoMatch.label+". "+videoMatch.sub+" Dit is jouw startniveau. Het verandert als jij verandert.",
      chips:["Start video","Terug"]});
    saveState();render();return;
  }
  if(txt==="Ander niveau"&&state._spiegelBlok){
    state.chatMsgs.push({t:"sys",text:"Kies je tijd.",chips:VIDEO_NIVEAUS.map(v=>v.label)});
    render();return;
  }

  // ── V9: START VIDEO — registreer fysieke stap ──
  if(txt==="Start video"&&state._spiegelBlok){
    const blok=state.canvas&&state.canvas.we&&state.canvas.we.bewegingBlokken?state.canvas.we.bewegingBlokken.find(b=>b.id===state._spiegelBlok):null;
    const niv=blok&&blok.videoNiveau?VIDEO_NIVEAUS.find(v=>v.id===blok.videoNiveau):VIDEO_NIVEAUS[0];
    // Registreer fysieke stap
    addRegistratie(state._spiegelBlok,"fysiek","Video "+niv.label+" gestart");
    addRouteStap(state._spiegelBlok,{wat:"Fysiek: "+niv.label,type:"fysiek"});
    if(state.canvas)Canvas.writeMoment(state.canvas,"zwart","Fysiek bewogen: "+niv.label);
    state.chatMsgs.push({t:"sys",text:niv.label+". Start. Geen gewichten. Jij en beweging. Overal.",
      chips:["Klaar","Halverwege gestopt"]});
    saveState();render();return;
  }
  // Video afgerond
  if((txt==="Klaar"||txt==="Halverwege gestopt")&&state._spiegelFase==="fysiek"){
    const voltooid=txt==="Klaar";
    addRegistratie(state._spiegelBlok,"fysiek",voltooid?"Video afgerond":"Video halverwege gestopt");
    const resp=voltooid
      ?"Gedaan. Geregistreerd. Je hebt bewogen. Dat is alles wat telt."
      :"Halverwege. Ook data. Volgende keer iets minder lang of hetzelfde. Jij bepaalt.";
    state._spiegelFase="mentaal"; // terug naar mentaal
    state.chatMsgs.push({t:"sys",text:resp,chips:["Hoe voel ik me","Mijn route","Blok afronden"]});
    saveState();render();return;
  }

  // ── V9: BLOK AFRONDEN vanuit spiegel ──
  if((txt==="Blok afronden"||txt==="\u25A0 Afgerond")&&state._spiegelBlok){
    const blokId=state._spiegelBlok;
    const blok=state.canvas&&state.canvas.we&&state.canvas.we.bewegingBlokken?state.canvas.we.bewegingBlokken.find(b=>b.id===blokId):null;
    const titel=blok?blok.titel:"Blok";
    completeBeweegBlok(blokId);
    state._spiegelBlok=null;
    state._spiegelFase=null;
    state._spiegelStap=0;
    // Check of er een volgend blok is
    const volgend=getActiefBeweegBlok();
    const volgendTekst=volgend?" Volgende beweging: "+volgend.titel+".":"";
    state.chatMsgs.push({t:"sys",text:titel+" afgerond. Staat op je route."+volgendTekst,
      chips:volgend?["Open "+volgend.titel,"Mijn route","Mijn canvas"]:["Mijn route","Mijn canvas"]});
    saveState();render();return;
  }
  // Legacy ■ Afgerond zonder spiegelBlok
  if(txt==="\u25A0 Afgerond"&&state._activeBlock){
    const abId=state._activeBlock;
    state._activeBlock=null;
    state._blockAwaitingClose=false;
    const bc=(state.blocksCompleted||[]).length+1;
    state.chatMsgs.push({t:"sys",text:"Gezien. Blok "+bc+" afgerond.",chips:["Terug naar route","Mijn progressie"]});
    completeBlock(abId);
    saveState();render();return;
  }

  // ── NAVIGATIE CHIPS ──
  if(txt==="Terug naar route"||txt==="Mijn route"){state.tab="route";render();return;}
  if(txt==="Mijn progressie"&&state.tab==="chat"){state.tab="dashboard";render();return;}
  if(txt==="Mijn canvas"){state.tab="dashboard";render();return;}
  // "Open [titel]" chip — open volgend blok
  const openBlokMatch=txt.match(/^Open\s+(.+)$/i);
  if(openBlokMatch&&state.canvas&&state.canvas.we&&state.canvas.we.bewegingBlokken){
    const titel=openBlokMatch[1].trim();
    const blok=state.canvas.we.bewegingBlokken.find(b=>b.titel===titel&&b.status==="actief");
    if(blok){chatSend("Ik wil werken aan: "+titel);return;}
  }

  // ── V8 COMPAT: custom doel via chat ──
  const addGoalMatch=txt.match(/^(?:ik wil (?:aan|werken aan|meer)|ik wil)\s+(.{3,80})$/i);
  if(addGoalMatch && state.ud && !state._spiegelBlok){
    const goalText=addGoalMatch[1].replace(/\s*(?:werken|aan het werken)$/i,"").trim();
    if(goalText.length>=3){
      if(!state.customGoals) state.customGoals=[];
      const exists=state.customGoals.find(g=>g.text.toLowerCase()===goalText.toLowerCase());
      if(!exists){
        state.customGoals.push({text:goalText,sub:"Door jou toegevoegd",measure:"Hoe gaat het met "+goalText.toLowerCase()+"?",date:Date.now()});
        state.chatMsgs.push({t:"sys",text:goalText+". Staat op je route.",chips:["Mijn route","Nog iets"]});
        saveState();render();return;
      }else{
        state.chatMsgs.push({t:"sys",text:"Dit blok staat al op je route.",chips:["Mijn route"]});
        render();return;
      }
    }
  }

  _chatBusy=true;
  render();

  // ── V9: Spiegel-gesprek opslaan bij actief blok ──
  if(state._spiegelBlok){
    addSpiegelGesprek(state._spiegelBlok,txt);
    state._spiegelStap=(state._spiegelStap||0)+1;
  }

  // Build conversation history
  const history=state.chatMsgs.filter(m=>m.t==="usr"||m.t==="sys").filter(m=>m.t!=="intro").map(m=>({t:m.t,text:m.text}));

  const r=await callLLM(history,state.ud,state.cks,state.sess);

  // Add response
  state.chatMsgs.push({t:"sys",text:r.text,chips:r.chips||[]});

  // ── V9: Blok-aware chips toevoegen ──
  if(state._spiegelBlok){
    const blok=state.canvas&&state.canvas.we&&state.canvas.we.bewegingBlokken?state.canvas.we.bewegingBlokken.find(b=>b.id===state._spiegelBlok):null;
    r.chips=r.chips||[];
    // Na mentaal gesprek: mentale route-stap opslaan
    if(state._spiegelFase==="mentaal"&&state._spiegelStap>=1){
      addRouteStap(state._spiegelBlok,{wat:txt.substring(0,80),type:"mentaal"});
      addRegistratie(state._spiegelBlok,"mentaal",txt.substring(0,80));
    }
    // Na 2+ gesprekken: bied fysiek aan als blok mentaal+fysiek is
    // Fysiek is bereikbaar via FYSIEK toggle in blok-header, niet via chip
    // Altijd optie om blok af te ronden na gesprek
    if(state._spiegelStap>=2&&!r.chips.includes("Blok afronden")){
      r.chips.push("Blok afronden");
    }
    // Spiegel-antwoord ook opslaan bij blok
    addSpiegelGesprek(state._spiegelBlok,"[spiegel] "+r.text.substring(0,120));
  }
  // V8 legacy block handling
  else if(state._activeBlock && !state._blockAwaitingClose){
    state._blockAwaitingClose=true;
    r.chips=r.chips||[];
    if(!r.chips.includes("\u25A0 Afgerond")) r.chips.push("\u25A0 Afgerond");
  } else if(state._activeBlock && state._blockAwaitingClose){
    const abId=state._activeBlock;
    state._activeBlock=null;
    state._blockAwaitingClose=false;
    r.chips=r.chips||[];
    r.chips.push("\u25A0 Blok afgerond");
    completeBlock(abId);
  }

  _chatBusy=false;
  saveState();
  render();
}

// ════════════════════════════════════════════════════════════════
// CHECK-IN FLOW (CHANGE 6)
// ════════════════════════════════════════════════════════════════

function buildCheckinFlow(){
  const wrap=h("div",{class:"scr"});
  wrap.append(h("div",{class:"lg",style:{marginBottom:"6px"}},"Check-in."));
  wrap.append(h("div",{class:"body-text",style:{marginBottom:"12px",opacity:"0.5",fontSize:"12px"}},"Hoe gaat het vandaag?"));
  // Geen uitleg — de keuze spreekt

  const moods=[
    {val:"Goed",sub:"Het gaat goed"},
    {val:"Oke",sub:"Gewoon oke"},
    {val:"Lastig",sub:"Het is lastig"}
  ];

  const grid=h("div",{class:"blok-grid"});
  moods.forEach(m=>{
    const bg=m.val==="Goed"?"var(--ink)":m.val==="Lastig"?"var(--red)":"var(--ghost)";
    const bl=h("div",{class:"blok",style:{background:bg,cursor:"pointer"}},
      h("div",{class:"blok-text",style:{fontSize:"14px"}},m.val),
      h("div",{class:"blok-sub",style:{color:"rgba(255,255,255,.5)"}},m.sub)
    );
    bl.addEventListener("click",()=>{
      state._checkinMood=m.val;
      render();
    });
    grid.append(bl);
  });
  wrap.append(grid);

  if(state._checkinMood){
    wrap.append(h("div",{style:{marginTop:"16px"}},
      h("input",{class:"chat-field",style:{width:"100%",marginBottom:"10px"},placeholder:"Eén zin. Wat speelt er?",id:"checkin-note"}),
      h("div",{class:"blok",style:{cursor:"pointer",textAlign:"center"},onClick:()=>{
        const note=document.getElementById("checkin-note");
        const noteText=note?note.value.trim():"";
        if(!state.cks) state.cks=[];
        state.cks.push({day:new Date().getDay(),week:getWeekNum(),mood:state._checkinMood,note:noteText,date:Date.now()});
        // V9: Canvas — schrijf moment (BEWEEG JE?)
        if(state.canvas){
          const moodToBlok={Goed:"zwart",Oke:"grijs",Lastig:"lijn"};
          Canvas.writeMoment(state.canvas,moodToBlok[state._checkinMood]||"grijs",noteText);
        }
        state._checkinMood=null;
        state._showCheckin=false;
        completeBlock("checkin-d");
        state.tab="route";
        saveState();
        render();
      }},
        h("div",{class:"blok-text",style:{fontSize:"11px"}},"Opslaan")
      )
    ));
  }

  return wrap;
}

function generateGoals(canonScores, driveAns, role, canonAns) {
  const goals = [];
  const cs = canonScores || {};
  const da = driveAns || {};

  // ── 1. BLOKSCORE-GEBASEERDE DOELEN (specifiek per Canon-blok) ──
  const blokScores = canonAns ? canonBlokScores(canonAns) : {};

  // Sorteer blokken op score: laagste eerst = meeste ontwikkelruimte
  const sortedBloks = Object.entries(blokScores)
    .filter(([k,v]) => v > 0) // alleen beantwoorde blokken
    .sort((a,b) => a[1] - b[1]);

  // Pak de 2 zwakste blokken als ontwikkelstappen
  sortedBloks.slice(0, 2).forEach(([blok, score]) => {
    const meta = BLOK_META[blok];
    if (!meta) return;
    const isLow = score < 50;
    goals.push({
      id: "blok-" + blok.toLowerCase(),
      area: meta.fase,
      blok: blok,
      text: isLow ? meta.low : meta.high,
      sub: blok + " — " + meta.desc + " (" + score + "%)",
      type: isLow ? "bewustwording" : "toepassen",
      score: score,
      measure: null
    });
  });

  // Als er ook een sterk blok is (>75): voeg verdiepingsblok toe
  const sterkBlok = sortedBloks.find(([k,v]) => v > 75);
  if (sterkBlok) {
    const [blok, score] = sterkBlok;
    const meta = BLOK_META[blok];
    if (meta && !goals.find(g => g.blok === blok)) {
      goals.push({
        id: "blok-" + blok.toLowerCase() + "-sterk",
        area: meta.fase,
        blok: blok,
        text: meta.high,
        sub: blok + " — " + score + "% — kracht",
        type: "verdieping",
        score: score,
        measure: null
      });
    }
  }

  // Fallback als geen blokscores
  if (goals.length === 0) {
    if (cs.WIJ < 50) goals.push({id:"wij-laag", area:"WIJ", blok:null, text:"Hoe je naar jezelf en anderen kijkt", sub:"Hier is ruimte", type:"bewustwording", score:cs.WIJ, measure:null});
    else if (cs.INVESTEREN < 50) goals.push({id:"inv-laag", area:"INVESTEREN", blok:null, text:"Meer geven van jezelf", sub:"Investeren begint bij weten wat je waard bent", type:"bewustwording", score:cs.INVESTEREN, measure:null});
    else goals.push({id:"balans", area:"CANON", blok:null, text:"Alles in balans. Verdiepen.", sub:"De basis staat.", type:"verdieping", score:0, measure:null});
  }

  // ── 2. DRIVE-GEBASEERDE DOELEN (persoonlijk, meetbaar) ──
  const d1 = Array.isArray(da.D1) ? da.D1 : (da.D1 ? [da.D1] : []);
  d1.forEach((doel, i) => {
    const mapped = DRIVE_GOAL_MAP[doel];
    if (mapped) {
      goals.push({
        id: "drive-" + i,
        area: "DRIVE",
        blok: null,
        text: mapped.text,
        sub: da.D2 || "Uit je Drive",
        type: "persoonlijk",
        score: null,
        measure: mapped.measure
      });
    } else {
      goals.push({
        id: "drive-" + i,
        area: "DRIVE",
        blok: null,
        text: doel,
        sub: da.D2 || "Uit je Drive",
        type: "persoonlijk",
        score: null,
        measure: "Hoe gaat het hiermee?"
      });
    }
  });

  // ── 3. DRIVE BARRIERE ALS DOEL ──
  const d4 = Array.isArray(da.D4) ? da.D4 : [];
  if (d4.length > 0) {
    const barrier = d4[0]; // eerste barriere
    goals.push({
      id: "barrier-0",
      area: "BARRIERE",
      blok: null,
      text: barrier + " overwinnen",
      sub: da.D4b || "Dit hield je eerder tegen",
      type: "bewustwording",
      score: null,
      measure: "Speelt " + barrier.toLowerCase() + " nog?"
    });
  }

  // ── 4. CUSTOM DOELEN (door gebruiker toegevoegd via chat) ──
  const custom = state.customGoals || [];
  custom.forEach((cg, i) => {
    goals.push({
      id: "custom-" + i,
      area: "PERSOONLIJK",
      blok: null,
      text: cg.text,
      sub: cg.sub || "Door jou toegevoegd",
      type: "persoonlijk",
      score: null,
      measure: cg.measure || "Hoe gaat het hiermee?"
    });
  });

  return goals;
}

  if (!state.startDate) return state.weekNum || 0;
  return Math.floor((Date.now() - state.startDate) / (7 * 86400000)) + 1;

  state.blocksCompleted.push({id,date:Date.now()});

}

  // Fallback: als er geen bewegingBlokken zijn, toon oude route-blokken
  if(beweging.length===0){

    blocks.filter(b=>!b.sticky&&!done.includes(b.id)).slice(0,6).forEach((b,i)=>{

  return h("div",{class:"scr"},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"20px"}},

      h("div",{style:{fontSize:"11px",fontWeight:"800",letterSpacing:".14em",color:"var(--ghost)"}},afgerond.length+"/"+beweging.length)

}

function buildEvaluation(){
  const s=state;const ud=s.ud||{};
  const shifted=ud.canonScores?Spiegel.shiftCanon(ud.canonScores,s.cks,s.sess):null;
  const orig=ud.canonScores;
  const a=Spiegel.analyzeCheckins(s.cks||[]);
  const completed=(s.blocksCompleted||[]).length;

  const wrap=h("div",{class:"scr"});
  wrap.append(h("div",{class:"lg",style:{marginBottom:"6px"}},"Evaluatie."));
  wrap.append(h("div",{class:"body-text",style:{marginBottom:"12px",opacity:"0.5",fontSize:"12px"}},"2 weken. Tijd om stil te staan."));
  // Geen uitleg — de data spreekt

  // Canon vergelijking
  const grid=h("div",{class:"blok-grid"});
  if(shifted&&orig){
    ["WIJ","KIEZEN","INVESTEREN"].forEach(k=>{
      const d=shifted[k]-(orig[k]||0);
      grid.append(h("div",{class:"blok blok-sticky"},
        h("div",{class:"blok-cat"},k.toLowerCase()),
        h("div",{style:{flex:"1",display:"flex",alignItems:"center"}},
          h("div",{class:"blok-text",style:{fontSize:"18px"}},shifted[k]+"%")
        ),
        h("div",{class:"blok-sub"},d!==0?(d>0?"+":"")+d+"% sinds start":"Geen verschuiving")
      ));
    });
  }

  // Stats
  grid.append(h("div",{class:"blok blok-sticky"},
    h("div",{class:"blok-cat"},"blokken afgerond"),
    h("div",{style:{flex:"1",display:"flex",alignItems:"center"}},h("div",{class:"blok-text",style:{fontSize:"18px"}},String(completed))),
    h("div",{class:"blok-sub"},"In 2 weken")
  ));
  grid.append(h("div",{class:"blok blok-sticky"},
    h("div",{class:"blok-cat"},"consistentie"),
    h("div",{style:{flex:"1",display:"flex",alignItems:"center"}},h("div",{class:"blok-text",style:{fontSize:"18px"}},a.consistency+"%")),
    h("div",{class:"blok-sub"},a.consistency>=70?"Sterk":a.consistency>=40?"Opbouwen":"Meer nodig")
  ));

  wrap.append(grid);

  // Vraag
  wrap.append(h("div",{style:{marginTop:"20px"}},
    h("div",{class:"body-text",style:{fontSize:"12px",marginBottom:"12px"}},"Hoe voel je je nu vergeleken met toen je begon?")
  ));

  const opts=["Beter","Hetzelfde","Minder","Weet ik niet"];
  const optWrap=h("div",{class:"blok-grid"});
  opts.forEach(o=>{
    const bl=h("div",{class:"blok",style:{cursor:"pointer",padding:"14px"}},
      h("div",{class:"blok-text",style:{fontSize:"11px"}},o)
    );
    bl.addEventListener("click",()=>{
      state.evalDone=true;
      state.evalAnswer=o;
      state.evalDate=Date.now();
      saveState();
      state.tab="chat";
      chatSend("Evaluatie: ik voel me "+o.toLowerCase());
      render();
    });
    optWrap.append(bl);
  });
  wrap.append(optWrap);

  wrap.append(h("div",{class:"body-text",style:{marginTop:"16px",fontSize:"10px",opacity:"0.3"}},"Dit is geen test. Dit is een spiegel van 2 weken."));

  return wrap;
}

  ];

  const wrap=h("div",{class:"scr"});

      h("div",{style:{fontSize:"11px",fontWeight:"800",color:"var(--ink)",letterSpacing:".02em"}},stap)
    ));

  wrap.append(ketenWrap);

  // ── Items — direct DOM toggle ──
  WAAROM.forEach(w=>{
    const item=h("div",{});
    const body=h("div",{style:{maxHeight:"0",overflow:"hidden",transition:"max-height .3s ease, opacity .25s ease",opacity:"0"}});

    bodyInner.append(h("div",{style:{fontSize:"9px",fontWeight:"700",color:"var(--rule)",marginTop:"12px",cursor:"pointer",letterSpacing:".06em"},onClick:e=>{e.stopPropagation();state.tab="chat";chatSend("Vertel me meer over "+w.titel);render();}},"VRAAG HET IN JE SPIEGEL \u2192"));

      const isOpen=body.style.maxHeight!=="0px"&&body.style.maxHeight!=="0"&&body.style.maxHeight!=="";
      if(isOpen){body.style.maxHeight="0";body.style.opacity="0";arrow.textContent="+";arrow.style.transform="rotate(0deg)";}
      else{body.style.maxHeight=body.scrollHeight+"px";body.style.opacity="1";arrow.textContent="\u2212";arrow.style.transform="rotate(180deg)";}
    }});
    header.append(h("div",{style:{fontSize:"14px",fontWeight:"800",color:"var(--ink)",letterSpacing:"-.01em"}},w.titel));
    header.append(arrow);
    item.append(header);
    item.append(body);
    wrap.append(item);
  });

  // ── Signature ──
  wrap.append(h("div",{style:{marginTop:"36px",paddingTop:"16px",borderTop:"1px solid var(--bg)"}},
    h("div",{style:{fontSize:"14px",fontWeight:"800",color:"var(--ink)",lineHeight:"1.5",marginBottom:"8px"}},"Wij kijken wie ",h("span",{style:{fontStyle:"italic",fontWeight:"400"}},"jij")," bent en passen ",h("span",{style:{fontStyle:"italic",fontWeight:"400"}},"ons")," daar op aan."),
    h("div",{style:{fontSize:"10px",fontWeight:"500",color:"var(--ghost)",lineHeight:"1.6",marginTop:"12px"}},"Elke stap die gezet wordt, is een succes.")
  ));

  return wrap;
}

function buildDashboard(){
  const s=state;const ud=s.ud;const cv=s.canvas;
  const shifted=cv&&cv.eg&&cv.eg.canonVerschuiving&&cv.eg.canonVerschuiving.huidig?cv.eg.canonVerschuiving.huidig:Spiegel.shiftCanon(ud.canonScores,s.cks,s.sess);
  const orig=cv?cv.be.canon.scores:ud.canonScores;
  const name=cv&&cv.be.profiel.naam?cv.be.profiel.naam:(ud.name||"jij");
  const beweging=cv&&cv.we?cv.we.bewegingBlokken||[]:[];
  const da=s.driveAns||ud.driveAns||{};
  const actiefBlok=beweging.find(b=>b.status==="actief");
  const afgerond=beweging.filter(b=>b.status==="afgerond");
  const openBlokken=beweging.filter(b=>b.status==="open");
  const matchScore=ud.matchScore||0;

  // Dag context
  const dagen=["Zondag","Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag"];
  const nu=new Date();const dagNaam=dagen[nu.getDay()];
  const startDate=s.startDate||(ud&&ud.startDate);
  const dagNr=startDate?Math.floor((Date.now()-startDate)/86400000)+1:0;
  const dagLabel=dagNr>0?"Dag "+dagNr:"";

  const wrap=h("div",{});

  // ═══ 1. NAME + DAY (keep as-is) ═══
  // Handled in return statement below

  // ═══ 2. DRIVE DOELEN — klikbare items met Canon koppeling ═══
  const blokScores=(s.canonAns||ud.canonAns)?canonBlokScores(s.canonAns||ud.canonAns):{};
  const hasBlokScores=Object.keys(blokScores).length>0;
  const driveBlokken=beweging.filter(b=>b.bron==="drive"&&b.bronVeld==="D1");
  const totalGoals=driveBlokken.length;
  if(!state._canvasOpen)state._canvasOpen={};

  if(totalGoals>0){
    wrap.append(h("div",{style:{marginTop:"24px"}}));
    wrap.append(h("div",{style:{fontSize:"9px",fontWeight:"800",letterSpacing:".14em",color:"var(--ghost)",marginBottom:"14px"}},"JIJ WILT"));

    driveBlokken.forEach((blok,idx)=>{
      const isActief=blok.status==="actief";
      const isAfgerond=blok.status==="afgerond";
      const isLocked=!isActief&&!isAfgerond;
      const nummer=(idx+1)+"/"+totalGoals;
      const isOpen=state._canvasOpen[blok.id]||(isActief&&state._canvasOpen[blok.id]!==false);

      // Canon blokken gekoppeld aan dit doel
      const linkedCanon=(typeof DRIVE_CANON_LINK!=="undefined"&&DRIVE_CANON_LINK[blok.titel])?DRIVE_CANON_LINK[blok.titel]:Object.entries(blokScores).sort((a,b)=>a[1]-b[1]).slice(0,3).map(([k])=>k);

      const goalWrap=h("div",{style:{marginBottom:"2px",opacity:isLocked?".3":"1"}});

      // ── Header row ──
      const canClick=isActief||isAfgerond;
      const header=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:isActief?"14px 0 10px":"10px 0",borderBottom:isOpen?"none":"1px solid var(--bg)",cursor:canClick?"pointer":"default"},onClick:canClick?()=>{state._canvasOpen[blok.id]=!isOpen;render()}:null});

      header.append(h("div",{style:{fontSize:"10px",fontWeight:"800",color:isAfgerond?"var(--ghost)":"var(--ink)",minWidth:"28px"}},nummer));
      header.append(h("div",{style:{fontSize:isActief?"15px":"12px",fontWeight:isActief?"900":"700",color:isAfgerond?"var(--ghost)":"var(--ink)",flex:"1",textDecoration:isAfgerond?"line-through":"none"}},blok.titel));

      if(isAfgerond)header.append(h("div",{style:{fontSize:"10px",fontWeight:"700",color:"var(--ghost)"}},(isOpen?"▾":"klaar")));
      if(isActief)header.append(h("div",{style:{fontSize:"9px",fontWeight:"800",letterSpacing:".1em",color:"var(--ink)"}},isOpen?"▾":"▸"));
      if(isLocked)header.append(h("div",{style:{fontSize:"9px",fontWeight:"600",color:"var(--rule)"}},"straks"));

      goalWrap.append(header);

      // ── Expanded: Canon detail per doel ──
      if(isOpen&&(isActief||isAfgerond)&&hasBlokScores){
        const detail=h("div",{style:{padding:"4px 0 16px 38px"}});

        // Sorteer Canon blokken: laagste score eerst (meeste ruimte)
        const sortedLinked=linkedCanon.map(b=>[b,blokScores[b]||0]).sort((a,b)=>a[1]-b[1]);
        const blokDescs=sortedLinked.map(([b])=>{const m=BLOK_META[b];return m?m.desc.toLowerCase():b.toLowerCase()});

        // ── Menselijke koppeling-zin ──
        const koppelingZin=blokDescs.length>=3
          ?blokDescs[0]+", "+blokDescs[1]+" en "+blokDescs[2]
          :blokDescs.length===2?blokDescs[0]+" en "+blokDescs[1]
          :blokDescs[0]||"";
        detail.append(h("div",{style:{fontSize:"11px",fontWeight:"600",color:"var(--ink)",marginBottom:"4px",lineHeight:"1.5"}},"Om "+blok.titel.toLowerCase()+" te bereiken gaat het om "+koppelingZin+"."));

        // ── Uitleg laag 1: waarom ──
        const uitlegWrap=h("div",{style:{marginBottom:"14px"}});
        const uitlegLink=h("div",{style:{fontSize:"9px",fontWeight:"600",color:"var(--rule)",cursor:"pointer",lineHeight:"1.5",marginTop:"2px"}},"Hoe weten we dat?");
        const uitlegDetail=h("div",{style:{display:"none",marginTop:"8px"}});

        uitlegDetail.append(h("div",{style:{fontSize:"10px",fontWeight:"500",color:"var(--ghost)",lineHeight:"1.7",marginBottom:"8px"}},"Je Canon laat zien hoe je denkt, kijkt en handelt. Niet goed of fout. Gewoon wie je nu bent."));
        uitlegDetail.append(h("div",{style:{fontSize:"10px",fontWeight:"500",color:"var(--ghost)",lineHeight:"1.7",marginBottom:"8px"}},"In je Drive heb je verteld wat je wilt en waarom. Die twee samen laten zien waar jouw ruimte zit."));
        uitlegDetail.append(h("div",{style:{fontSize:"10px",fontWeight:"700",color:"var(--ink)",lineHeight:"1.7",marginBottom:"8px"}},"Daar passen wij ons op aan."));
        uitlegDetail.append(h("div",{style:{fontSize:"9px",fontWeight:"600",color:"var(--rule)",cursor:"pointer",lineHeight:"1.5"},onClick:()=>{state.tab="chat";chatSend("Hoe werkt de koppeling tussen Canon en Drive?");render()}},"Meer weten? Vraag het in je Spiegel \u2192"));

        // ── Uitleg laag 2: percentages ──
        const percLink=h("div",{style:{fontSize:"9px",fontWeight:"600",color:"var(--rule)",cursor:"pointer",lineHeight:"1.5",marginTop:"4px"}},"Wat betekent het percentage?");
        const percDetail=h("div",{style:{display:"none",marginTop:"6px"}});
        percDetail.append(h("div",{style:{fontSize:"10px",fontWeight:"500",color:"var(--ghost)",lineHeight:"1.7"}},"Het percentage laat zien waar je nu staat. Laag is niet slecht — het betekent dat daar de meeste ruimte zit om te groeien. Elke stap die je daar zet, is er een. Wij staan naast je."));
        percLink.onclick=()=>{percDetail.style.display=percDetail.style.display==="none"?"block":"none";percLink.textContent=percDetail.style.display==="none"?"Wat betekent het percentage?":"Sluiten"};
        uitlegDetail.append(percLink);
        uitlegDetail.append(percDetail);

        uitlegLink.onclick=()=>{uitlegDetail.style.display=uitlegDetail.style.display==="none"?"block":"none";uitlegLink.textContent=uitlegDetail.style.display==="none"?"Hoe weten we dat?":"Sluiten"};
        uitlegWrap.append(uitlegLink);
        uitlegWrap.append(uitlegDetail);
        detail.append(uitlegWrap);

        // ── Canon blokken met scores ──
        sortedLinked.forEach(([canonBlok,score])=>{
          const meta=typeof BLOK_META!=="undefined"?BLOK_META[canonBlok]:null;
          const isLow=score<50;
          const desc=meta?(isLow?meta.low:meta.high):"";

          const row=h("div",{style:{marginBottom:"12px"}});
          row.append(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}},
            h("div",{style:{fontSize:"11px",fontWeight:"700",color:"var(--ink)"}},canonBlok),
            h("div",{style:{fontSize:"11px",fontWeight:"800",color:"var(--ink)"}},score+"%")
          ));
          row.append(h("div",{style:{height:"3px",background:"var(--rule)",marginBottom:"6px"}},
            h("div",{style:{height:"100%",width:score+"%",background:"var(--ink)",transition:"width .6s ease"}})
          ));
          if(desc)row.append(h("div",{style:{fontSize:"10px",fontWeight:"500",color:"var(--ghost)",lineHeight:"1.5"}},desc));
          detail.append(row);
        });

        // ── Spiegel koppeling ──
        if(isActief){
          detail.append(h("div",{style:{background:"var(--ink)",color:"var(--white)",padding:"14px 18px",marginTop:"16px",cursor:"pointer",fontSize:"13px",fontWeight:"800",letterSpacing:"-.01em",lineHeight:"1.3",transition:"opacity .15s"},onClick:()=>{state.tab="chat";chatSend("Ik wil werken aan: "+blok.titel);render()},onMouseenter:e=>{e.currentTarget.style.opacity=".85"},onMouseleave:e=>{e.currentTarget.style.opacity="1"}},"Hier beginnen we. Samen. \u2192"));
        }

        goalWrap.append(detail);
      }

      wrap.append(goalWrap);
    });

    // Transparant: waarom één tegelijk
    if(driveBlokken.filter(b=>b.status==="open").length>0){
      wrap.append(h("div",{style:{fontSize:"10px",fontWeight:"500",color:"var(--rule)",marginTop:"10px",lineHeight:"1.5",cursor:"pointer"},onClick:e=>{
        const el=e.currentTarget;
        if(el._expanded){el.textContent="Waarom één tegelijk?";el._expanded=false}
        else{el.textContent="Eén focus werkt beter dan tien halve. Werk dit af, dan volgt de rest.";el._expanded=true}
      }},"Waarom één tegelijk?"));
    }

    wrap.append(h("div",{style:{borderBottom:"1px solid var(--bg)",marginTop:"16px"}}));

  }else if(hasBlokScores){
    // Fallback: geen Drive doelen maar wel Canon data — toon ontwikkelgebieden
    const canonBlokken=beweging.filter(b=>b.bron==="canon");
    if(canonBlokken.length>0){
      wrap.append(h("div",{style:{marginTop:"24px"}}));
      wrap.append(h("div",{style:{fontSize:"9px",fontWeight:"800",letterSpacing:".14em",color:"var(--ghost)",marginBottom:"14px"}},"JOUW ONTWIKKELING"));
      canonBlokken.slice(0,3).forEach(b=>{
        const score=blokScores[b.bronBlok]||0;
        wrap.append(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"8px 0",borderBottom:"1px solid var(--bg)"}},
          h("div",{style:{fontSize:"11px",fontWeight:"700",color:"var(--ink)",flex:"1"}},b.titel),
          h("div",{style:{flex:"2",height:"3px",background:"var(--rule)",position:"relative"}},
            h("div",{style:{position:"absolute",left:"0",top:"0",height:"100%",width:score+"%",background:"var(--ink)"}})
          ),
          h("div",{style:{fontSize:"10px",fontWeight:"800",color:"var(--ink)",width:"32px",textAlign:"right"}},score+"%")
        ));
      });
      wrap.append(h("div",{style:{borderBottom:"1px solid var(--bg)",marginTop:"16px"}}));
    }
  }

  // ═══ 3. MATCH — one number, clean ═══
  if(matchScore>0){
    wrap.append(h("div",{style:{padding:"14px 0",borderTop:"1px solid var(--bg)",borderBottom:"1px solid var(--bg)",marginBottom:"14px"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("div",{style:{fontSize:"9px",fontWeight:"800",letterSpacing:".14em",color:"var(--ghost)"}},"MATCH"),
        h("div",{style:{fontSize:"18px",fontWeight:"900",color:"var(--ink)"}},matchScore+"%")
      )
    ));
  }

  // ═══ 4. EVALUATIE MOMENT ═══
  if(startDate){
    const weeksPassed=Math.floor((Date.now()-startDate)/86400000/7);
    const evalWeeks=[2,6,12,24];
    for(let ew of evalWeeks){
      if(weeksPassed<ew){
        const daysUntil=Math.ceil((ew*7*86400000-(Date.now()-startDate))/86400000);
        const label=daysUntil<=3?"Evaluatie over "+daysUntil+" dag"+(daysUntil===1?"":"en")
          :daysUntil<=14?"Evaluatie over "+Math.ceil(daysUntil/7)+" "+(Math.ceil(daysUntil/7)===1?"week":"weken")
          :null;
        if(label){
          wrap.append(h("div",{style:{fontSize:"11px",fontWeight:"600",color:daysUntil<=3?"var(--ink)":"var(--ghost)",padding:"12px 0",borderTop:"1px solid var(--bg)",marginBottom:"14px"}},label));
        }
        break;
      }
    }
  }

  // ═══ 9. PREVENTIE SIGNALS ═══
  const preventieSignals=Spiegel.getPreventieSignals(ud,s.cks,beweging.filter(b=>b.status==="afgerond"),s.spiegelMemory,startDate);
  if(preventieSignals&&preventieSignals.length>0){
    wrap.append(h("div",{style:{marginBottom:"14px"}}));
    preventieSignals.slice(0,2).forEach(sig=>{
      const severity=sig.sev==="high"?"high":sig.sev==="med"?"med":"low";
      wrap.append(h("div",{class:"signal "+severity},
        h("div",{class:"signal-msg"},sig.text),
        sig.action?h("div",{class:"signal-action"},sig.action):null
      ));
    });
  }

  // ═══ 10. DEEL DATA — voor monitoring door trainer/Wes ═══
  wrap.append(h("div",{style:{marginTop:"28px",paddingTop:"12px",borderTop:"1px solid var(--bg)"}},
    h("button",{class:"btn-ghost",style:{fontSize:"10px",width:"100%"},onClick:()=>{
      const exportData={
        _beweeg_export:true,
        naam:name,rol:s.role,
        canonAns:s.canonAns,canonTimes:s.canonTimes,
        canonScores:ud.canonScores,
        driveAns:s.driveAns||ud.driveAns,driveScore:ud.driveScore,
        matchScore:ud.matchScore,
        baseline:s.baseline,devGoals:s.devGoals,
        route:ud.route,startDate:s.startDate,
        cks:s.cks,sess:s.sess,weekNum:s.weekNum,
        canvas:s.canvas,exportedAt:Date.now()
      };
      const json=JSON.stringify(exportData);
      navigator.clipboard.writeText(json).then(()=>{
        const btn=event.target;btn.textContent="Gekopieerd";setTimeout(()=>{btn.textContent="Deel data met trainer"},2000);
      }).catch(()=>{
        // Fallback: toon in prompt
        prompt("Kopieer deze data:",json);
      });
    }},"Deel data met trainer")
  ));

  // ═══ 11. SIGNATURE ═══
  wrap.append(h("div",{style:{fontSize:"9px",fontWeight:"600",color:"rgba(12,12,12,.25)",letterSpacing:".1em",marginTop:"24px"}},"De app ben jij."));

  return h("div",{class:"scr"},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"6px"}},
      h("div",{class:"lg"},name+"."),
      dagLabel?h("div",{style:{fontSize:"10px",fontWeight:"700",letterSpacing:".1em",color:"var(--ghost)"}},dagLabel):null
    ),
    dagNaam?h("div",{style:{fontSize:"11px",fontWeight:"600",color:"var(--ghost)",marginBottom:"20px"}},dagNaam):null,
    wrap
  );
}
